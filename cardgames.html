<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Rescue - Find the A's</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        
        #game-area { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            /* Added 'no-repeat fixed' to ensure background covers properly */
            background: url("/pictures/background/light_mode_backround.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        .item-pic { 
            position: absolute; 
            width: 140px; 
            height: 140px; 
            border: 6px solid #fff; /* Thicker, nicer border */
            border-radius: 20px; 
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .letter-a { 
            position: absolute; 
            font-size: 60px; 
            font-weight: 900; 
            cursor: pointer;
            z-index: 10; 
            color: #f1c40f; 
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }

        .found { 
            border: 5px solid red !important; 
            border-radius: 50%; 
            pointer-events: none; 
        }

        #score-board { 
            position: absolute; top: 30px; right: 30px; 
            background: rgba(0,0,0,0.6); color: white;
            padding: 20px; border-radius: 15px; font-weight: bold; 
            font-size: 24px; z-index: 20; border: 2px solid white;
        }

        #timer { position: absolute; top: 30px; left: 30px; background: rgba(0,0,0,0.6); color: white; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 24px; z-index: 20; border: 2px solid white; }
    
        #win-screen { 
            display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; 
            color: white; font-size: 40px; text-align: center; flex-direction: column;
        }




    </style>
</head>
<body>

    <div id="game-area">
        <div id="timer">Time: 0s</div>
        <div id="score-board">Letters left: <span id="count">0</span></div>
    </div>

    <div id="win-screen">
        <h1>Mission Accomplished!</h1>
        <p id="final-time"></p>
        <button onclick="location.reload()" style="padding: 20px; font-size: 20px;">Play Again</button>
    </div>

    <script>
        let startTime = Date.now();
        let timerInterval = setInterval(updateTimer, 1000);
        let totalLetters = 0; // Track this globally

        function updateTimer() {
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = "Time: " + elapsed + "s";
        }

        // Inside your existing createA function, update the check:
        function createA(x, y) {
            const a = document.createElement('div');
            a.innerText = 'A';
            a.className = 'letter-a';
            a.style.left = x + 'px';
            a.style.top = y + 'px';
            
            a.onclick = () => {
                if(!a.classList.contains('found')) {
                    a.classList.add('found');
                    let count = parseInt(document.getElementById('count').innerText) - 1;
                    document.getElementById('count').innerText = count;
                    
                    // This part was likely missing!
                    if(count === 0) {
                        clearInterval(timerInterval);
                        showWinScreen();
                    }
                }
            };
            gameArea.appendChild(a);
        }
        
        const originalItems = [
            { name: 'stork.png', correct: 'A' }, { name: 'table.png', correct: 'hands' },
            { name: 'school-bus.png', correct: 'A' }, { name: 'shark.png', correct: 'A' },
            { name: 'pinapple.png', correct: 'A' }, { name: 'watermellon.png', correct: 'A' },
            { name: 'chair.png', correct: 'hands' }, { name: 'apricot.png', correct: 'A' }
        ];

        const gameArea = document.getElementById('game-area');
        const placedPositions = [];

        // Check if new position overlaps existing items
        function isTooClose(x, y, minDistance = 180) {
            return placedPositions.some(pos => Math.hypot(pos.x - x, pos.y - y) < minDistance);
        }
        

        function getRandomPosition() {
            for (let i = 0; i < 200; i++) {
                // Keep away from edges (padding 100px)
                let x = Math.random() * (window.innerWidth - 200) + 50;
                let y = Math.random() * (window.innerHeight - 200) + 50;
                if (!isTooClose(x, y)) return {x, y};
            }
            return {x: 100, y: 100};
        }
        function showWinScreen() {
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('final-time').innerText = "Total time: " + elapsed + " seconds!";
            document.getElementById('win-screen').style.display = "flex";
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }

        function initGame() {
            let totalA = 0;

            originalItems.forEach((item) => {
                const pos = getRandomPosition();
                placedPositions.push(pos);

                const img = document.createElement('img');
                img.src = '/pictures/game3/' + item.name;
                img.className = 'item-pic';
                
                // Add random rotation -45 to 45 degrees
                const rotation = Math.floor(Math.random() * 91) - 45;
                img.style.left = pos.x + 'px';
                img.style.top = pos.y + 'px';
                img.style.transform = `rotate(${rotation}deg)`;
                
                gameArea.appendChild(img);

                if (item.correct === 'A') {
                    totalA++;
                    createA(pos.x + 40, pos.y + 30);
                }
            });

            // Add 3 Extra A's in random empty spots
            for(let i = 0; i < 3; i++) {
                totalA++;
                const pos = getRandomPosition();
                createA(pos.x, pos.y);
            }
            
            document.getElementById('count').innerText = totalA;
        }


        initGame();
    </script>
</body>
</html>
