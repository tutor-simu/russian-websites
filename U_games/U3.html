<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Соедини звуки</title>
    <style>
        :root { --bg-image: url('../pictures/background/space_backround.jpeg'); }
        
        body { 
            margin: 0; min-height: 100vh; overflow-x: hidden; font-family: sans-serif; 
            background-image: var(--bg-image); background-size: cover; 
            background-position: center; background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5); background-blend-mode: darken;
        }

        /* Template Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { background: #2f2f5f; padding: 30px; border-radius: 20px; text-align: center; border: 3px solid #fff; color: white; max-width: 80%; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #6e8efb; color: white; border: none; border-radius: 10px; margin: 10px; }

        /* Game Specific Styles */
        #game-area { 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            gap: 100px; padding: 20px; box-sizing: border-box;
        }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .column { display: flex; flex-direction: column; gap: 20px; z-index: 2; }
        
        .node { 
            width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; 
            font-size: 3.5rem; font-weight: bold; border: 4px solid #6e8efb; border-radius: 25px; 
            background: white; cursor: pointer; transition: transform 0.2s;
            user-select: none; -webkit-user-drag: none;
        }
        .node img { width: 90%; height: 90%; object-fit: contain; pointer-events: none; }

        /* Media queries for larger screens */
        @media (min-width: 768px) {
            #game-area { padding: 50px; max-width: 1200px; margin: 0 auto; justify-content: space-between; gap: 0; }
            .column { gap: 40px; }
            .node { width: 180px; height: 180px; font-size: 5rem; border-radius: 35px; }
            .box { padding: 40px; }
        }
    </style>
</head>
<body>

    <div id="start-modal" class="overlay">
        <div class="box">
            <h1>Добро пожаловать!</h1>
            <p>Инструкция: Соедини букву с соответствующей картинкой.</p>
            <button class="btn" onclick="document.getElementById('start-modal').style.display='none'">Играть</button>
        </div>
    </div>

    <div id="game-area">
        <div class="column" id="left-col">
            <div class="node" data-id="A">А</div>
            <div class="node" data-id="U">У</div>
            <div class="node" data-id="O">О</div>
        </div>

        <div class="column" id="right-col">
            <div class="node" data-id="U"><img src="../pictures/U/iron.png" alt="iron"></div>
            <div class="node" data-id="O"><img src="../pictures/U/shoes.png" alt="shoes"></div>
            <div class="node" data-id="A"><img src="../pictures/game3/shark-scary.png" alt="shark"></div>
        </div>
    </div>

    <div id="end-modal" class="overlay" style="display: none;">
        <div class="box">
            <h1>Молодец!</h1>
            <button class="btn" onclick="location.reload()">Играть снова</button>
            <button class="btn" onclick="window.location.href='U4.html'">Далее</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // --- Logic ---
        function shuffleNodes(containerId) {
            const container = document.getElementById(containerId);
            const nodes = Array.from(container.children);
            nodes.sort(() => Math.random() - 0.5).forEach(node => container.appendChild(node));
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, startNode = null, connections = [], mousePos = {x:0, y:0};

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            draw(); 
        }
        window.onresize = resize;
        window.onload = () => { 
            shuffleNodes('left-col'); 
            shuffleNodes('right-col'); 
            resize(); 
        };

        function getCenter(el) {
            const rect = el.getBoundingClientRect();
            return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
        }

        function drawLine(p1, p2, color) {
            ctx.beginPath(); ctx.lineWidth = 8; ctx.strokeStyle = color;
            ctx.lineCap = "round"; ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            connections.forEach(c => drawLine(c.start, c.end, "#10b981"));
            if (isDrawing) drawLine(getCenter(startNode), mousePos, "#6e8efb");
        }

        function findNode(clientX, clientY) {
            const nodes = document.querySelectorAll('.node');
            return Array.from(nodes).find(n => {
                const r = n.getBoundingClientRect();
                return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
            });
        }

        // --- Event Handlers (Mouse & Touch) ---
        
        function dragStart(e) {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            startNode = findNode(clientX, clientY);
            if (startNode) isDrawing = true;
        }

        function dragMove(e) {
            if (!isDrawing) return;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            mousePos = { x: clientX, y: clientY }; 
            draw(); 
        }

        function dragEnd(e) {
            if (!isDrawing) return;
            const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
            const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
            
            const endNode = findNode(clientX, clientY);
            
            if (endNode && endNode !== startNode && endNode.dataset.id === startNode.dataset.id && endNode.parentElement !== startNode.parentElement) {
                connections.push({start: getCenter(startNode), end: getCenter(endNode)});
                if(connections.length === 3) document.getElementById('end-modal').style.display = 'flex';
            }
            isDrawing = false; 
            draw();
        }

        // Mouse Listeners
        window.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', dragEnd);

        // Touch Listeners
        window.addEventListener('touchstart', (e) => { dragStart(e); e.preventDefault(); }, { passive: false });
        window.addEventListener('touchmove', (e) => { dragMove(e); e.preventDefault(); }, { passive: false });
        window.addEventListener('touchend', dragEnd);

    </script>
</body>
</html>
