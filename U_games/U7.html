<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поём с Космиком</title>
    <style>
        body {
            margin: 0;
            background: #3b9ae1; /* Ocean blue background */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-view {
            display: flex;
            flex-wrap: nowrap; /* Forces everything strictly onto one line */
            align-items: center;
            justify-content: center;
            width: 90vw;
            gap: 2px;
        }

        .letter {
            color: black;
            font-weight: bold;
            transition: color 0.5s ease;
            line-height: 1;
        }

        .active { color: red; }

        /* General Popup styles */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Semi-transparent start overlay so game behind is slightly visible */
            z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }

        #end-modal {
            background: rgba(0, 0, 0, 0.7); /* Keep end modal darker for focus */
        }

        .popup, .box {
            background: white; padding: 30px; border-radius: 20px; 
            z-index: 101; text-align: center; width: 80%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button, .btn { 
            padding: 15px 20px; font-size: 16px; background: #6e8efb; 
            color: white; border: none; border-radius: 10px; 
            cursor: pointer; flex: 1; min-width: 120px;
        }
    </style>
</head>
<body>

    <div id="start-overlay" class="overlay">
        <div class="popup">
            <h1>А ты любишь петь?</h1>
            <p>Пропой вместе с котёнком Космиком, смотри, чтобы до конца строчки голос твой не останавливался.</p>
            <button onclick="startGame()">Начать петь</button>
        </div>
    </div>

    <div id="game-view"></div>

    <div id="end-modal" class="overlay" style="display: none;">
        <div class="box">
            <h1>Молодец!</h1>
            <p>Что делаем дальше?</p>
            <div class="button-row">
                <button class="btn" onclick="location.reload()">Ещё раз</button>
                <button class="btn" onclick="window.location.href='U8.html'">Далее</button>
            </div>
        </div>
    </div>

    <script>
        const groups = [
            { char: 'А', count: 11, size: 'big' },
            { char: 'О', count: 9, size: 'big' },
            { char: 'У', count: 11, size: 'big' },
            { char: 'А', count: 11, size: 'small' },
            { char: 'О', count: 9, size: 'small' },
            { char: 'У', count: 11, size: 'small' }
        ];

        let currentIndex = 0;

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            showGroup();
        }

        function showGroup() {
            const container = document.getElementById('game-view');
            container.innerHTML = ''; 
            
            const group = groups[currentIndex];
            
            // Calculate dynamic font size to ensure it fits perfectly in a single line
            const calculatedSize = Math.min(14, 85 / group.count) + 'vw';

            for(let i = 0; i < group.count; i++) {
                const span = document.createElement('span');
                span.innerText = group.char;
                span.className = 'letter';
                span.style.fontSize = calculatedSize;
                container.appendChild(span);
            }
            animateGroup();
        }

        async function animateGroup() {
            const letters = document.querySelectorAll('.letter');
            for (let letter of letters) {
                letter.classList.add('active');
                await new Promise(r => setTimeout(r, 400));
            }

            await new Promise(r => setTimeout(r, 1000));
            
            currentIndex++;
            if (currentIndex < groups.length) {
                showGroup();
            } else {
                document.getElementById('end-modal').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
