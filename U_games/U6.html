<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Пишем букву У</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: url('../pictures/background/space_backround.jpeg') no-repeat center center fixed;
            background-size: cover;
            background-color: #0b0e14; /* Fallback dark space color */
            height: 100vh;
            display: flex;
            flex-wrap: wrap; /* Allows wrapping into multiple lines gracefully */
            justify-content: center;
            align-items: center;
            gap: 20px; /* Adjusted gap to ensure everything fits without scrolling */
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Strictly prevents any scrollbars */
        }

        .trace-container {
            position: relative;
            width: 260px;  /* Width from 150px */
            height: 340px; /* Height from 200px */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        
        .trace-container:active {
            transform: scale(1.02);
        }

        .guide-letter {
            font-size: 200px; /* Scaled up letter display from 80px */
            color: #e2e2e2;
            user-select: none;
            position: absolute;
            z-index: 1;
            line-height: 1;
            font-weight: bold;
        }

        .trace-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: crosshair;
            touch-action: none;
            z-index: 2;
        }

        /* Expanded Popup Elements */
        .popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 45px;
            border-radius: 35px;
            z-index: 1000;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border: 6px solid #6e8efb;
            text-align: center;
            width: 85%;
            max-width: 460px;
            box-sizing: border-box;
        }

        .popup h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .popup p {
            font-size: 20px;
            line-height: 1.5;
            color: #444;
        }

        .btn {
            padding: 18px 36px;
            font-size: 22px; /* Bigger, finger-friendly button texts */
            border: none;
            border-radius: 20px;
            background: #6e8efb;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 5px 15px rgba(110, 142, 251, 0.4);
        }
        .btn:hover { background: #5a75e0; }
        .btn:active { transform: scale(0.98); }

        #dim-overlay {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 999;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div id="instructions-popup" class="popup" style="display: block;">
        <h1>Добро пожаловать!</h1>
        <p>Правила игры: Обведи букву "У" на всех карточках мышкой или пальцем.</p>
        <button class="btn" onclick="closeInstructions()">Начать игру</button>
    </div>

    <div id="congrats-popup" class="popup">
        <h1 style="color: #6e8efb; margin-top: 0;">Молодец!</h1>
        <div class="button-row">
            <button class="btn" onclick="location.reload()">Играть снова</button>
            <button class="btn" onclick="window.location.href='U7.html'">Далее</button>
        </div>
    </div>

    <div id="dim-overlay"></div>

    <div class="trace-container"><div class="guide-letter">У</div><canvas class="trace-canvas"></canvas></div>
    <div class="trace-container"><div class="guide-letter">У</div><canvas class="trace-canvas"></canvas></div>
    <div class="trace-container"><div class="guide-letter">У</div><canvas class="trace-canvas"></canvas></div>
    <div class="trace-container"><div class="guide-letter">У</div><canvas class="trace-canvas"></canvas></div>

    <script>
        let completed = 0;
        const total = 4; // Updated total to 4

        // Unified layout size markers matching CSS values
        const CARD_WIDTH = 260;
        const CARD_HEIGHT = 340;

        function closeInstructions() {
            document.getElementById('instructions-popup').style.display = 'none';
            document.getElementById('dim-overlay').style.display = 'none';
        }

        document.querySelectorAll('.trace-canvas').forEach(canvas => {
            canvas.width = CARD_WIDTH; 
            canvas.height = CARD_HEIGHT;
            const ctx = canvas.getContext('2d');
            let isDrawing = false, hasDrawn = false;
            
            // Scaled stroke width up to 9px to match larger footprint nicely
            ctx.strokeStyle = '#6e8efb'; 
            ctx.lineWidth = 9; 
            ctx.lineCap = 'round'; 
            ctx.lineJoin = 'round';

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                // Track dynamic scaling properties accurately 
                return { 
                    x: (clientX - rect.left) * (canvas.width / rect.width), 
                    y: (clientY - rect.top) * (canvas.height / rect.height) 
                };
            };

            const start = (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); };
            const draw = (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            const end = () => { if (isDrawing && !hasDrawn) { hasDrawn = true; completed++; checkAll(); } isDrawing = false; };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
            canvas.addEventListener('touchend', end);
        });

        function checkAll() {
            if (completed === total) {
                document.getElementById('dim-overlay').style.display = 'block';
                confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 } });
                document.getElementById('congrats-popup').style.display = 'block';
            }
        }
    </script>
</body>
</html>
