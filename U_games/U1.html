<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Раскрась буквы У!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents awkward scrolling on mobile devices */
            font-family: 'Comic Sans MS', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-image: url("../pictures/background/space_backround.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-evenly; /* Distributes everything nicely on one screen */
            box-sizing: border-box;
            padding: 10px;
        }

        /* Large visual title reminder for 3-year-olds */
        .instructions {
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin: 45px 10px 0 10px;
            text-shadow: 0 0 15px #ffa502, 0 2px 4px rgba(0,0,0,0.5);
            max-width: 85%;
            user-select: none;
        }
        
        /* Grid Layout: Compact row/column spacing */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 3 clean rows total on desktop/tablets */
            gap: 15px;
            width: 85vw;
            max-width: 550px;
            box-sizing: border-box;
        }

        @media (max-width: 500px) {
            .instructions {
                font-size: 22px;
                margin-top: 55px;
            }
            .grid-container {
                grid-template-columns: repeat(3, 1fr); /* 3 columns balances aspect ratio beautifully on tall mobile phones */
                gap: 10px;
                width: 90vw;
            }
        }

        .star-group { 
            cursor: pointer; 
            width: 100%; 
            max-height: 11vh; /* Scales down automatically on short mobile displays to preserve room */
            transition: transform 0.2s; 
        }
        .star-group:active { transform: scale(0.92); }
        .star { fill: #ffffff; stroke: #333; stroke-width: 3; transition: fill 0.3s; }
        .letter { pointer-events: none; font-size: 35px; font-weight: bold; fill: #333; user-select: none; }
        
        .controls { 
            display: flex; 
            gap: 20px; 
            align-items: center; 
            margin-bottom: 10px;
        }
        
        button { 
            padding: 12px 28px; 
            font-size: 18px; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        #reset-btn { background: #ff4757; color: white; }
        #submit-btn { background: #2ed573; color: white; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #ffffff; padding: 40px; border-radius: 20px; text-align: center; color: #121224; max-width: 85%; }
        #completion-modal { display: none; }

        .top-right-cat { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            width: 65px; 
            z-index: 50; 
        }
        
        @media (max-width: 500px) {
            .top-right-cat { width: 50px; }
            button { padding: 10px 22px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <img src="../pictures/CHARACTERS/astro_cat.png" class="top-right-cat" alt="Cat Character">
    
    <h1 class="instructions">Нажми на все буквы У! ⭐</h1>

    <div id="welcome-modal" class="modal">
        <div class="modal-content">
            <h2>Добро пожаловать!</h2>
            <p>Пожалуйста, нажмите на все буквы "У", чтобы их раскрасить.</p>
            <button onclick="document.getElementById('welcome-modal').style.display='none'">Начать!</button>
        </div>
    </div>

    <div class="grid-container" id="star-grid"></div>

    <div class="controls">
        <button id="reset-btn" onclick="location.reload()">Reset</button>
        <button id="submit-btn" onclick="checkAnswer()">Submit</button>
    </div>

    <div id="completion-modal" class="modal">
        <div class="modal-content">
            <h2>Отлично!</h2>
            <button onclick="location.reload()" style="margin-bottom: 10px;">Играть снова</button><br>
            <button onclick="location.href='U2.html'">Далее</button>
        </div>
    </div>

    <script>
        const letters = ['У', 'У', 'У', 'У', 'У', 'У', 'А', 'Б', 'В', 'Г'];
        letters.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('star-grid');

        letters.forEach((char) => {
            const group = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            group.setAttribute("viewBox", "0 0 100 100");
            group.classList.add('star-group');
            group.innerHTML = `
                <polygon class="star" points="50,5 61,35 95,35 67,55 78,85 50,65 22,85 33,55 5,35 39,35" />
                <text x="50" y="55" text-anchor="middle" dominant-baseline="middle" class="letter">${char}</text>
            `;
            group.dataset.char = char;
            group.onclick = () => {
                group.querySelector('.star').style.fill = '#ffa502';
                group.dataset.colored = "true";
            };
            grid.appendChild(group);
        });

        function checkAnswer() {
            const colored = document.querySelectorAll('[data-colored="true"]');
            let correct = true;
            let count = 0;
            colored.forEach(s => {
                if (s.dataset.char !== 'У') correct = false;
                else count++;
            });

            if (correct && count === 6) {
                confetti({ particleCount: 250, spread: 120, origin: { y: 0.5 } });
                document.getElementById('completion-modal').style.display = 'flex';
            } else {
                alert("Попробуй еще раз! Нужно раскрасить только 6 букв 'У'.");
            }
        }
    </script>
</body>
</html>
