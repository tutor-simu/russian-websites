<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Раскрась буквы У!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents awkward scrolling on mobile devices */
            font-family: 'Comic Sans MS', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-image: url("../pictures/background/space_backround.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-evenly; /* Distributes everything nicely on one screen */
            box-sizing: border-box;
            padding: 20px;
        }
        
        /* Grid Layout: Scaled up significantly to make the stars way bigger */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px;
            width: 85vw;
            max-width: 900px; /* Massive stars on desktop */
            box-sizing: border-box;
            margin-top: 40px;
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr); /* Balanced layout for mobile screens */
                gap: 15px;
                width: 92vw;
            }
        }

        .star-group { 
            cursor: pointer; 
            width: 100%; 
            height: auto; /* Lets the SVG scale naturally up and down */
            transition: transform 0.2s; 
        }
        .star-group:active { transform: scale(0.92); }
        .star { fill: #ffffff; stroke: #333; stroke-width: 3; transition: fill 0.3s; }
        
        /* Font size relative to the 100x100 SVG box so it stays perfectly inside the star */
        .letter { 
            pointer-events: none; 
            font-size: 38px; 
            font-weight: bold; 
            fill: #333; 
            user-select: none; 
        }
        
        .controls { 
            display: flex; 
            gap: 20px; 
            align-items: center; 
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        button { 
            padding: 16px 32px; 
            font-size: 22px; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            color: white;
        }
        button:active { transform: scale(0.95); }
        #reset-btn { background: #ff4757; }
        #submit-btn { background: #2ed573; }
        .modal-btn { background: #ffa502; color: #121224; margin-top: 15px; }

        /* Space-themed translucent modals */
        .modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(10, 10, 25, 0.88); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
        }
        
        .modal-content { 
            background: rgba(20, 20, 45, 0.95); 
            padding: 40px; 
            border-radius: 25px; 
            text-align: center; 
            color: #ffffff; 
            max-width: 85%;
            border: 3px solid #ffa502;
            box-shadow: 0 0 30px rgba(255, 165, 2, 0.4);
        }
        
        #completion-modal { display: none; }

        /* Corner Russian U with a styled container */
        .top-left-u { 
            position: absolute; 
            top: 15px; 
            left: 20px; 
            font-size: 55px; 
            font-weight: bold; 
            color: #ffa502; 
            z-index: 50;
            user-select: none;
            background: rgba(20, 20, 45, 0.9);
            padding: 5px 18px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 2px solid #ffa502;
        }

        .top-right-cat { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            width: 65px; 
            z-index: 50; 
        }
        
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        @media (max-width: 500px) {
            .top-right-cat { width: 50px; }
            .top-left-u { font-size: 36px; top: 12px; left: 15px; padding: 4px 14px; border-radius: 15px; }
            button { padding: 12px 28px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="top-left-u">У</div>
    <img src="../pictures/CHARACTERS/astro_cat.png" class="top-right-cat" alt="Cat Character">

    <div id="welcome-modal" class="modal">
        <div class="modal-content">
            <h2>Добро пожаловать!</h2>
            <p>Пожалуйста, нажмите на все буквы "У", чтобы их раскрасить.</p>
            <button class="modal-btn" onclick="document.getElementById('welcome-modal').style.display='none'">Начать!</button>
        </div>
    </div>

    <div class="grid-container" id="star-grid"></div>

    <div class="controls">
        <button id="reset-btn" onclick="location.reload()">Reset</button>
        <button id="submit-btn" onclick="checkAnswer()">Submit</button>
    </div>

    <div id="completion-modal" class="modal">
        <div class="modal-content">
            <h2>Отлично!</h2>
            <div class="modal-buttons">
                <button id="reset-btn" onclick="location.reload()">Играть снова</button>
                <button id="submit-btn" onclick="location.href='U2.html'">Далее</button>
            </div>
        </div>
    </div>

    <script>
        const letters = ['У', 'У', 'У', 'У', 'У', 'У', 'А', 'Б', 'В', 'Г'];
        letters.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('star-grid');

        letters.forEach((char) => {
            const group = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            group.setAttribute("viewBox", "0 0 100 100");
            group.classList.add('star-group');
            group.innerHTML = `
                <polygon class="star" points="50,5 61,35 95,35 67,55 78,85 50,65 22,85 33,55 5,35 39,35" />
                <text x="50" y="58" text-anchor="middle" dominant-baseline="middle" class="letter">${char}</text>
            `;
            group.dataset.char = char;
            group.onclick = () => {
                group.querySelector('.star').style.fill = '#ffa502';
                group.dataset.colored = "true";
            };
            grid.appendChild(group);
        });

        function checkAnswer() {
            const colored = document.querySelectorAll('[data-colored="true"]');
            let correct = true;
            let count = 0;
            colored.forEach(s => {
                if (s.dataset.char !== 'У') correct = false;
                else count++;
            });

            if (correct && count === 6) {
                confetti({ particleCount: 250, spread: 120, origin: { y: 0.5 } });
                document.getElementById('completion-modal').style.display = 'flex';
            } else {
                alert("Попробуй еще раз! Нужно раскрасить только 6 букв 'У'.");
            }
        }
    </script>
</body>
</html>
