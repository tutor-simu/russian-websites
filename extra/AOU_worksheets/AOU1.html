<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космическая миссия: Найди лишний предмет | Bilingvi Online</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --primary: #6c5ce7;
            --accent: #a8e6cf;
            --text: #2d3436;
            --white: #ffffff;
            --danger: #ff7675;
            --shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-image: url('../pictures/background/space_background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            padding: 30px; 
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Aesthetic Modal Overlay */
        .modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(9, 28, 63, 0.85); 
            backdrop-filter: blur(12px);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            animation: fadeIn 0.4s ease;
        }

        /* Pop-up Card */
        .modal-content { 
            background: linear-gradient(135deg, #130f40 0%, #30336b 100%);
            color: var(--white);
            padding: 40px 35px; 
            border-radius: 40px; 
            text-align: center; 
            width: 90%;
            max-width: 450px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
            animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.1s;
        }

        .modal-icon {
            font-size: 45px;
            font-weight: 800;
            color: #74b9ff;
            margin-bottom: 20px;
            animation: floatEffect 3s ease-in-out infinite;
        }

        .modal-content h1 {
            color: #74b9ff;
            margin-bottom: 15px;
            font-size: 2.4rem;
            font-weight: 800;
            text-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .modal-content p {
            font-size: 1.25rem;
            color: #dfe6e9;
            margin-bottom: 35px;
            font-weight: 600;
            line-height: 1.4;
        }

        /* Main Game Space Card */
        .game-card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 50px 40px; 
            border-radius: 45px; 
            box-shadow: var(--shadow); 
            width: 100%;
            max-width: 1200px; 
            text-align: center; 
            box-sizing: border-box;
            backdrop-filter: blur(8px);
            border: 4px solid rgba(255,255,255,0.6);
            animation: fadeIn 0.6s ease;
        }

        .target-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 25px;
            margin-bottom: 35px;
            padding-left: 20px;
        }

        .target-letter-box {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ff6b6b, #ee5253);
            border-radius: 30px;
            color: var(--white);
            font-size: 3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(238, 82, 83, 0.4);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .instruction-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            margin: 0;
        }

        /* Horizontal 4-Column Layout */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .card-item {
            background: var(--white);
            border-radius: 30px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            border: 4px solid transparent;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            padding: 15px;
            box-sizing: border-box;
        }

        .card-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .card-item:hover {
            transform: translateY(-10px) scale(1.04);
            box-shadow: 0 20px 45px rgba(108, 92, 231, 0.25);
            border-color: var(--accent);
        }

        .card-item.wrong {
            border-color: var(--danger);
            animation: shake 0.4s ease-in-out;
            background: #ffeaa7;
        }

        /* Buttons */
        .btn { 
            padding: 18px 45px; 
            border-radius: 50px; 
            border: none; 
            font-size: 1.2rem;
            font-weight: 800; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .btn-start {
            background: linear-gradient(135deg, #0984e3, #6c5ce7);
            color: var(--white);
        }
        
        .btn-restart { 
            background: #dfe6e9; 
            color: var(--text); 
        }

        .btn-next { 
            background: linear-gradient(135deg, #00b894, #10ac84); 
            color: var(--white); 
        }

        .btn:hover { 
            transform: translateY(-5px) scale(1.03); 
            filter: brightness(1.1); 
        }

        @media (max-width: 992px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes floatEffect { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-12px); } 
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div id="entranceModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">КОСМИЧЕСКИЙ ПАТРУЛЬ</div>
            <h1>Космический патруль</h1>
            <p>Внимательно изучите букву в верхнем левом углу. Нажмите на карточку с предметом, который к ней <strong>не относится</strong> (лишний предмет), чтобы продолжить полет!</p>
            <button class="btn btn-start" onclick="document.getElementById('entranceModal').style.display='none'">Начать миссию</button>
        </div>
    </div>

    <div id="successModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon" style="animation: none; font-size: 40px;">МИССИЯ ВЫПОЛНЕНА</div>
            <h1 style="color: #a8e6cf;">Успех!</h1>
            <p>Все космические преграды пройдены успешно!</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn btn-restart" onclick="location.reload()">Играть снова</button>
                <a href="../ENTRENCE_PAGES/M.html" class="btn btn-next">Далее</a>
            </div>
        </div>
    </div>

    <div class="game-card" id="gameCardBlock">
        <div class="target-header">
            <div class="target-letter-box" id="targetLetter">А</div>
            <div class="instruction-text">Найди лишний предмет!</div>
        </div>

        <div class="cards-grid" id="cardsGrid"></div>

        <div style="margin-top: 35px; display: flex; justify-content: center; gap: 20px;">
            <button class="btn btn-restart" onclick="resetRound()">Сброс</button>
        </div>
    </div>

    <script>
        const roundsData = [
            {
                letter: 'А',
                cards: [
                    { img: '../../pictures/O/watermellon.png', isOdd: false, alt: 'Watermelon' },
                    { img: '../../pictures/game6/sofa.png', isOdd: true, alt: 'Sofa' },      
                    { img: '../../pictures/game3/school-bus.png', isOdd: false, alt: 'Bus' },
                    { img: '../../pictures/game3/aquarium.png', isOdd: false, alt: 'Fishbowl' }
                ]
            },
            {
                letter: 'У',
                cards: [
                    { img: '../../pictures/U/mustage.png', isOdd: false, alt: 'Mustache' },
                    { img: '../../pictures/U/snail_color.jpeg', isOdd: false, alt: 'Snail' },
                    { img: '../../pictures/game3/stork.png', isOdd: true, alt: 'Stork' }, 
                    { img: '../../pictures/U/rod.png', isOdd: false, alt: 'Fishing Rod' } 
                ]
            }
        ];

        let currentRoundIndex = 0;

        function loadRound(roundIndex) {
            if (roundIndex >= roundsData.length) {
                document.getElementById('successModal').style.display = 'flex';
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                return;
            }

            const round = roundsData[roundIndex];
            document.getElementById('targetLetter').innerText = round.letter;
            
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';

            round.cards.forEach((cardData) => {
                const card = document.createElement('div');
                card.className = 'card-item';
                
                const imgTag = document.createElement('img');
                imgTag.src = cardData.img;
                imgTag.alt = cardData.alt;
                
                imgTag.onerror = function() { 
                    this.style.display = 'none'; 
                    card.innerText = cardData.alt;
                    card.style.fontWeight = '700';
                    card.style.color = '#6c5ce7';
                    card.style.fontSize = '1.2rem';
                    card.style.textAlign = 'center';
                };

                card.appendChild(imgTag);

                card.onclick = () => {
                    if (cardData.isOdd) {
                        confetti({ particleCount: 80, spread: 50 });
                        setTimeout(() => {
                            currentRoundIndex++;
                            loadRound(currentRoundIndex);
                        }, 600);
                    } else {
                        card.classList.add('wrong');
                        setTimeout(() => card.classList.remove('wrong'), 400);
                    }
                };

                grid.appendChild(card);
            });
        }

        function resetRound() {
            loadRound(currentRoundIndex);
        }

        loadRound(currentRoundIndex);
    </script>
</body>
</html>
