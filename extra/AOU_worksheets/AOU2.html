<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Раскрась ракету | Bilingvi Online</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

        :root {
            --primary: #4a69bd;
            --accent: #78e08f;
            --bg: #f5f6fa;
            --text: #1e272e;
            --yellow: #fcd116;
            --blue: #0984e3;
            --red: #ff3838;
            --white: #ffffff;
        }
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%); 
            color: var(--text); 
            margin: 0; 
            padding: 15px 10px; 
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Attractive Entrance Popup */
        .modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(30, 39, 46, 0.85); 
            backdrop-filter: blur(8px);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            animation: fadeIn 0.5s ease;
        }
        .modal-content { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 30px; 
            text-align: center; 
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: scale(0.9);
            animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.2s;
        }
        .modal-icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        .modal-content h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .modal-content p {
            font-size: 1.1rem;
            color: #576574;
            margin-bottom: 25px;
        }

        .card { 
            background: white; 
            padding: 25px 20px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            width: 100%;
            max-width: 500px; 
            box-sizing: border-box;
            text-align: center; 
        }
        
        h1 {
            font-weight: 800;
            color: var(--text);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .instruction { 
            font-size: 1.1rem; 
            margin-bottom: 20px; 
            font-weight: 700;
            color: #576574;
        }

        /* Palette */
        .palette { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .palette-btn { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: 4px solid #dfe6e9; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .palette-btn:hover {
            transform: translateY(-5px) scale(1.05);
        }
        .palette-btn.active { 
            border-color: var(--text); 
            transform: scale(1.15);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        #yellow-paint { background-color: var(--yellow); }
        #blue-paint { background-color: var(--blue); }
        #red-paint { background-color: var(--red); }

        .legend-container { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 20px; 
            font-size: 0.95rem; 
            font-weight: 700;
            background: #f1f2f6;
            padding: 12px 15px;
            border-radius: 20px;
        }
        
        @media (min-width: 450px) {
            .legend-container { 
                flex-direction: row;
                gap: 20px;
                border-radius: 50px;
            }
        }

        .legend-item { display: flex; align-items: center; gap: 10px; justify-content: center; }
        .legend-box { 
            width: 20px; 
            height: 20px; 
            border-radius: 6px;
            border: 2px solid rgba(0,0,0,0.1); 
            display: inline-block; 
        }

        /* Game board */
        .game-board { 
            display: flex; 
            justify-content: center; 
            position: relative; 
            margin: 0 auto; 
            width: 100%; 
            aspect-ratio: 400 / 640;
            max-height: 55vh;
            background: #222f3e;
            border-radius: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            padding: 8px 0;
            box-sizing: border-box;
        }
        
        svg { width: 100%; height: 100%; overflow: visible; }

        .rocket-part {
            fill: var(--white);
            stroke: #222f3e;
            stroke-width: 4;
            stroke-linejoin: round;
            cursor: pointer;
            transition: fill 0.4s ease, filter 0.3s ease;
        }
        
        .rocket-part:hover {
            filter: brightness(0.95);
        }

        .rocket-text {
            font-size: 38px;
            font-weight: 800;
            fill: #1e272e;
            text-anchor: middle;
            dominant-baseline: central;
            user-select: none;
            pointer-events: none;
        }

        /* Side-by-side Buttons */
        .nav-controls { display: flex; gap: 15px; margin-top: 25px; justify-content: center; flex-wrap: wrap; }
        .btn { 
            padding: 12px 25px; 
            border-radius: 50px; 
            border: none; 
            font-size: 1rem;
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            transition: all 0.3s; 
            box-sizing: border-box;
        }
        .btn-again { background: #dfe6e9; color: var(--text); }
        .btn-next { background: var(--primary); color: white; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .congrats { 
            display: none; 
            color: #2ed573; 
            font-size: 1.2rem; 
            font-weight: 800; 
            margin-top: 20px; 
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Modal button container */
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-10px); } 
        }
        @keyframes popIn { 
            0% { transform: scale(0); opacity: 0; } 
            80% { transform: scale(1.1); } 
            100% { transform: scale(1); opacity: 1; } 
        }
    </style>
</head>
<body>

    <div id="entranceModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">🚀</div>
            <h1>Внимание, Поехали!</h1>
            <p>Готовы отправиться в полет и раскрасить ракету по слогам?</p>
            <button class="btn btn-next" onclick="document.getElementById('entranceModal').style.display='none'">Начать полет</button>
        </div>
    </div>

    <div id="congratsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon" style="animation: none; font-size: 60px;">🏆</div>
            <h1 style="color: #2ed573;">Отлично!</h1>
            <p>Ракета раскрашена правильно!</p>
            <div class="modal-buttons">
                <button class="btn btn-again" onclick="resetGame(); document.getElementById('congratsModal').style.display='none'">Играть еще раз</button>
                <a href="AOU4.html" class="btn btn-next">Следующее</a>
            </div>
        </div>
    </div>

    <div class="card">
        <h1>Космическая Ракета</h1>
        <p class="instruction">Раскрась элементы ракеты по цветам.</p>

        <div class="legend-container">
            <div class="legend-item"><span class="legend-box" style="background: var(--yellow);"></span> AO — Желтый</div>
            <div class="legend-item"><span class="legend-box" style="background: var(--blue);"></span> УА — Синий</div>
            <div class="legend-item"><span class="legend-box" style="background: var(--red);"></span> OA — Красный</div>
        </div>

        <div class="palette">
            <button class="palette-btn active" id="yellow-paint" onclick="selectColor('yellow', 'AO')"></button>
            <button class="palette-btn" id="blue-paint" onclick="selectColor('blue', 'УА')"></button>
            <button class="palette-btn" id="red-paint" onclick="selectColor('red', 'OA')"></button>
        </div>

        <div class="game-board">
            <svg viewBox="0 0 400 640">
                <circle cx="50" cy="100" r="2" fill="#fff" opacity="0.5" />
                <circle cx="350" cy="80" r="3" fill="#fff" opacity="0.7" />
                <circle cx="80" cy="300" r="1.5" fill="#fff" opacity="0.4" />
                <circle cx="320" cy="450" r="2.5" fill="#fff" opacity="0.6" />

                <path id="wing-left" class="rocket-part" d="M 140,300 C 100,310 20,410 20,430 C 50,400 120,370 140,360 Z" onclick="fillPart('wing-left', 'AO')" />
                <text x="110" y="350" class="rocket-text" style="font-size: 32px;">AO</text>

                <path id="wing-right" class="rocket-part" d="M 260,300 C 300,310 380,410 380,430 C 350,400 280,370 260,360 Z" onclick="fillPart('wing-right', 'AO')" />
                <text x="290" y="345" class="rocket-text" style="font-size: 32px;">AO</text>

                <path id="body" class="rocket-part" d="M 140,140 C 140,100 160,70 200,70 C 240,70 260,100 260,140 L 260,380 C 260,400 240,420 200,420 C 160,420 140,400 140,380 Z" />

                <path id="nose" class="rocket-part" d="M 200,15 C 155,75 140,120 140,140 C 160,140 240,140 260,140 C 260,120 245,75 200,15 Z" onclick="fillPart('nose', 'OA')" />
                <text x="200" y="80" class="rocket-text">OA</text>

                <path id="circle-1" class="rocket-part" d="M 200,150 C 180,150 155,175 155,205 C 155,235 180,260 200,260 C 220,260 245,235 245,205 C 245,175 220,150 200,150 Z" onclick="fillPart('circle-1', 'УА')" />
                <text x="200" y="205" class="rocket-text">УА</text>

                <path id="circle-2" class="rocket-part" d="M 200,230 C 180,230 155,255 155,285 C 155,315 180,340 200,340 C 220,340 245,315 245,285 C 245,255 220,230 200,230 Z" onclick="fillPart('circle-2', 'УА')" />
                <text x="200" y="285" class="rocket-text">УА</text>

                <path id="circle-3" class="rocket-part" d="M 200,310 C 180,310 155,335 155,365 C 155,395 180,420 200,420 C 220,420 245,395 245,365 C 245,335 220,310 200,310 Z" onclick="fillPart('circle-3', 'УА')" />
                <text x="200" y="365" class="rocket-text">УА</text>

                <path id="flame-left" class="rocket-part" d="M 145,420 C 125,425 110,445 110,465 C 110,485 125,505 145,510 C 160,495 165,475 160,455 C 155,435 160,425 145,420 Z" onclick="fillPart('flame-left', 'OA')" />
                <text x="138" y="465" class="rocket-text" style="font-size: 20px;">OA</text>
                
                <path id="flame-center" class="rocket-part" d="M 200,445 C 180,450 165,470 165,490 C 165,510 180,530 200,535 C 215,520 220,500 215,480 C 210,460 215,450 200,445 Z" onclick="fillPart('flame-center', 'AO')" />
                <text x="195" y="490" class="rocket-text" style="font-size: 20px;">AO</text>

                <path id="flame-right" class="rocket-part" d="M 255,420 C 275,425 290,445 290,465 C 290,485 275,505 255,510 C 240,495 235,475 240,455 C 245,435 240,425 255,420 Z" onclick="fillPart('flame-right', 'OA')" />
                <text x="262" y="465" class="rocket-text" style="font-size: 20px;">OA</text>
            </svg>
        </div>

        <div id="congratsMessage" class="congrats">Отлично, ракета раскрашена правильно!</div>

        <div class="nav-controls">
            <button class="btn btn-again" onclick="resetGame()">Еще раз</button>
            <a href="AOU4.html" class="btn btn-next">Следующее</a>
        </div>
    </div>

    <script>
        let selectedColorHex = '#fcd116'; // default yellow
        let selectedSyllable = 'AO';

        const colorMap = {
            'yellow': '#fcd116',
            'blue': '#0984e3',
            'red': '#ff3838'
        };

        // Поддерживаем абсолютно любые варианты раскладок (кириллицу и латиницу)
        const syllableRules = {
            'AO': 'yellow',
            'АО': 'yellow',
            'AО': 'yellow',
            'АO': 'yellow',
            'УА': 'blue',
            'YA': 'blue',
            'УA': 'blue',
            'OA': 'red',
            'ОA': 'red',
            'OА': 'red',
            'ОA': 'red'
        };

        // Track completed parts to show success message
        const correctFills = {
            'wing-left': false,
            'wing-right': false,
            'nose': false,
            'circle-1': false,
            'circle-2': false,
            'circle-3': false,
            'flame-left': false,
            'flame-center': false,
            'flame-right': false
        };

        function selectColor(colorName, syllable) {
            selectedColorHex = colorMap[colorName];
            selectedSyllable = syllable;
            
            // Update active button visual
            document.querySelectorAll('.palette-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${colorName}-paint`).classList.add('active');
        }

        function fillPart(partId, targetSyllable) {
            // Проверяем по жестко заданному слогу, который передается в функцию
            const requiredColorName = syllableRules[targetSyllable];
            const requiredColorHex = colorMap[requiredColorName];

            if (selectedColorHex === requiredColorHex) {
                document.getElementById(partId).style.fill = selectedColorHex;
                correctFills[partId] = true;
            } else {
                alert(`Неверный цвет! Для слога "${targetSyllable}" выберите соответствующий цвет.`);
            }

            checkCompletion();
        }

        function checkCompletion() {
            const allFilled = Object.values(correctFills).every(val => val === true);
            if (allFilled) {
                document.getElementById('congratsMessage').style.display = 'block';
                
                // Trigger Popup Modal and Confetti
                document.getElementById('congratsModal').style.display = 'flex';
                
                // Throw Confetti
                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.6 }
                });
            }
        }

        function resetGame() {
            Object.keys(correctFills).forEach(key => {
                correctFills[key] = false;
                document.getElementById(key).style.fill = '#ffffff';
            });
            document.getElementById('congratsMessage').style.display = 'none';
        }
    </script>
</body>
</html>
