<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Rescue - Simit Targets</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #game-area { 
            width: 100vw; height: 100vh; position: relative; 
            background: url("pictures/background/light_mode_backround.jpeg") no-repeat center center fixed;
            background-size: cover;
        }
        
        /* Start Overlay */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200; color: white;
        }

        .item-pic { position: absolute; z-index: 1; pointer-events: none; }
        .letter-a { 
            position: absolute; font-size: 7vw; font-weight: 400; cursor: pointer;
            z-index: 3; user-select: none; transition: opacity 0.3s;
            pointer-events: none; /* Disabled until play is pressed */
        }
        #timer, #score-board { 
            position: absolute; top: 20px; background: rgba(0,0,0,0.6); color: white;
            padding: 15px; border-radius: 15px; font-weight: bold; font-size: 20px; z-index: 10;
        }
        #timer { left: 20px; }
        #score-board { right: 20px; }

        #win-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .btn-container { display: flex; gap: 20px; margin-top: 20px; }
        .nav-btn {
            padding: 15px 30px; font-size: 1.5vw; cursor: pointer;
            border-radius: 10px; border: none; background: white; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="start-screen">
            <h1 style="font-size: 3vw;">Найдите буквы А на картинке внизу</h1>
            <button class="nav-btn" onclick="startGame()">Play</button>
        </div>

        <div id="timer">Time: 0s</div>
        <div id="score-board">A's left: <span id="count">0</span></div>

        <div id="win-screen">
            <h1 style="color: white; font-size: 4vw;">Congratulations!</h1>
            <div class="btn-container">
                <button class="nav-btn" onclick="window.location.href='index.html'">Home</button>
                <button class="nav-btn" onclick="window.location.href='game5.html'">Next Page</button>
            </div>
        </div>
    </div>

    <script>
        const gameItems = [
            { src: 'pictures/game4/bear.png', x: 5, y: 20, ax: 15, ay: 20, color: '#805115', w: 12 },
            { src: 'pictures/game4/dog.png', x: 22, y: 8, ax: 38, ay: 20, color: '#863A1B', w: 12 },
            { src: 'pictures/game4/alian.png', x: 51, y: 10, ax: 61, ay: 20, color: '#40929F', w: 12 },
            { src: 'pictures/game3/pinapple.png', x: 75, y: 7, ax: 84, ay: 20, color: 'orange', w: 18 },
            { src: 'pictures/game3/stork.png', x: 15, y: 55, ax: 25, ay: 65, color: 'gray', w: 18 },
            { src: 'pictures/game3/watermellon.png', x: 40, y: 62, ax: 50, ay: 65, color: 'red', w: 18 },
            { src: 'pictures/game3/shark.png', x: 60, y: 45, ax: 75, ay: 65, color: '#507188', w: 18 }
        ];

        const gameArea = document.getElementById('game-area');
        let totalA = gameItems.length;
        let startTime;
        let timerInterval;

        document.getElementById('count').innerText = totalA;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            startTime = Date.now();
            
            // Enable clicking on letters
            const letters = document.querySelectorAll('.letter-a');
            letters.forEach(l => l.style.pointerEvents = 'auto');

            timerInterval = setInterval(() => {
                document.getElementById('timer').innerText = "Time: " + Math.floor((Date.now() - startTime) / 1000) + "s";
            }, 1000);
        }

        gameItems.forEach((item) => {
            const pic = document.createElement('img');
            pic.src = item.src;
            pic.className = 'item-pic';
            pic.style.left = item.x + '%';
            pic.style.top = item.y + '%';
            pic.style.width = item.w + '%';
            gameArea.appendChild(pic);

            const a = document.createElement('div');
            a.innerText = 'A';
            a.className = 'letter-a';
            a.style.left = item.ax + '%';
            a.style.top = item.ay + '%';
            a.style.color = item.color;
            
            a.onclick = function() {
                const circle = document.createElement('div');
                circle.style.position = 'absolute';
                circle.style.left = (item.ax - 0.7) + '%';
                circle.style.top = (item.ay + 0.5) + '%';
                circle.style.width = '6vw';
                circle.style.height = '6vw';
                circle.style.border = '4px solid rgba(255, 0, 0, 0.7)'; 
                circle.style.borderRadius = '50%';
                circle.style.zIndex = '2'; 
                circle.style.pointerEvents = 'none';
                gameArea.appendChild(circle);

                a.style.pointerEvents = 'none';
                a.style.opacity = '0.3';

                totalA--;
                document.getElementById('count').innerText = totalA;
                
                if(totalA === 0) {
                    clearInterval(timerInterval);
                    confetti({ particleCount: 200, spread: 100 });
                    document.getElementById('win-screen').style.display = 'flex';
                }
            };
            gameArea.appendChild(a);
        });
        window.addEventListener('load', () => {
            console.log("Images should be loaded. If not, check path case-sensitivity!");
        });
    </script>
</body>
</html>
