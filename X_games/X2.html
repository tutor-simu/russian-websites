<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Найди букву Х | Bilingvi Online</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('../pictures/background/space_backround.jpeg') center center/cover no-repeat fixed;
            background-color: #0b0b1e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            box-sizing: border-box;
            position: relative;
        }

        /* ========================================================
           CINEMATIC INTRO ANIMATION SYSTEM (ELEPHANT)
           ======================================================== */
        #intro-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2000;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(11, 11, 30, 0.55);
            backdrop-filter: blur(4px);
            transition: opacity 0.6s ease;
        }

        .elephant-container {
            display: flex;
            align-items: center;
            gap: 25px;
            transform: translateY(50px);
            opacity: 0;
            animation: slideUpIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
        }

        .circus-elephant-avatar {
            width: 260px;
            height: auto;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.5));
        }

        .speech-bubble {
            background: white;
            border-radius: 25px;
            padding: 22px 30px;
            font-size: 22px;
            font-weight: 800;
            color: #1e272e;
            position: relative;
            max-width: 340px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
            border: 4px solid #ff9f43;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -15px; top: 50%;
            transform: translateY(-50%);
            border-width: 15px 15px 15px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }

        /* ========================================================
           MAIN VIEWSPACE LAYOUT
           ======================================================== */
        #title-bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 30px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 800;
            color: #1e272e;
            margin-top: 15px;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid #ff9f43;
            text-align: center;
            max-width: 90%;
        }

        #main-workspace {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            justify-content: center;
            gap: 40px;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        #image-container {
            width: 100%;
            max-width: 460px;
            max-height: 65vh;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #circus-img {
            width: 100%;
            height: auto;
            max-height: 65vh;
            object-fit: contain;
            display: block;
        }

        /* ========================================================
           BOTTOM LEFT CONTROLS CONFIGURATION
           ======================================================== */
        #answer-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
            border: 3px solid #6e8efb;
            align-self: flex-end;
            margin-bottom: 20px;
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-label {
            font-size: 18px;
            font-weight: 800;
            color: #1e272e;
        }

        #answer-input {
            width: 80px;
            height: 50px;
            border-radius: 12px;
            border: 3px solid #d1d1d1;
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            color: #1e272e;
            font-family: 'Nunito', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        #answer-input:focus {
            border-color: #6e8efb;
        }

        #answer-input::-webkit-outer-spin-button,
        #answer-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #answer-input[type=number] {
            -moz-appearance: textfield;
        }

        .btn {
            padding: 12px 25px;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        #check-btn { background: #6e8efb; width: 100%; }
        #check-btn:hover { background: #5a75e0; transform: translateY(-2px); }

        /* ========================================================
           CHARACTER MODALS ARCHITECTURE
           ======================================================== */
        .popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 30px;
            z-index: 1000;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 520px;
            box-sizing: border-box;
        }

        .popup-layout {
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: left;
        }

        .popup-elephant {
            width: 140px;
            height: auto;
            flex-shrink: 0;
        }

        .popup-content {
            flex: 1;
        }

        .popup-content h1 { 
            margin-top: 0; 
            font-weight: 800; 
            font-size: 26px;
            margin-bottom: 10px;
        }

        #congrats-popup { border: 5px solid #2ed573; }
        #alert-popup { border: 5px solid #ff4757; }

        #dim-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 999;
        }

        /* Animations Framework */
        @keyframes slideUpIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        /* ========================================================
           RESPONSIVE MOBILE VIEWPORTS OVERRIDES (ИСПРАВЛЕНО ДЛЯ ТЕЛЕФОНОВ)
           ======================================================== */
        @media (max-width: 768px) {
            body { justify-content: flex-start; }
            #title-bubble { font-size: 16px; padding: 10px 15px; }
            #main-workspace { flex-direction: column; align-items: center; gap: 15px; padding: 5px 10px; }
            
            /* Увеличиваем картинку на телефоне */
            #image-container { max-width: 100%; max-height: 60vh; width: 95%; }
            #circus-img { max-height: 60vh; width: 100%; height: auto; }
            
            /* Компактная панель ответа, адаптированная под мобильный экран */
            #answer-panel { align-self: center; width: 90%; max-width: 320px; padding: 12px 20px; margin-bottom: 15px; gap: 10px; }
            
            .popup-layout { flex-direction: column; text-align: center; gap: 15px; }
            .popup-elephant { width: 110px; }
            #intro-stage { padding: 20px; }
            .elephant-container { flex-direction: column; text-align: center; gap: 15px; }
            .speech-bubble::after {
                left: 50%; top: -15px;
                transform: translateX(-50%);
                border-width: 0 15px 15px 15px;
                border-color: transparent transparent white transparent;
            }
            .circus-elephant-avatar { width: 160px; }
            .speech-bubble { font-size: 17px; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="intro-stage">
        <div class="elephant-container">
            <img src="../pictures/game4/bear.png" alt="Elephant" class="circus-elephant-avatar" onerror="this.src='https://placehold.co/260x260/ff9f43/ffffff?text=Слон'">
            <div class="speech-bubble">Привет! Найди все спрятавшиеся буквы "Х" на картинке и напиши ответ в окошко снизу!</div>
        </div>
    </div>

    <div id="title-bubble">Найди все спрятавшиеся буквы "Х". Сколько у тебя получилось?</div>

    <div id="main-workspace">
        
        <div id="image-container">
            <img id="circus-img" src="pictures/circus.png" alt="Circus Game">
        </div>

        <div id="answer-panel">
            <div class="panel-row">
                <span class="input-label">Твой ответ:</span>
                <input type="number" id="answer-input" placeholder="?" min="0" max="99">
            </div>
            <button id="check-btn" class="btn">Проверить</button>
        </div>

    </div>

    <div id="dim-overlay"></div>
    
    <div id="alert-popup" class="popup">
        <div class="popup-layout">
            <img src="../pictures/game4/bear.png" class="popup-elephant" alt="Elephant Feedback">
            <div class="popup-content">
                <h1 id="alert-title" style="color: #ff4757;">Ой, подумай ещё!</h1>
                <p id="alert-text" style="font-size: 17px; font-weight: 600; color: #1e272e; margin: 0;"></p>
                <button class="btn" style="background:#ff4757; margin-top:15px; padding: 8px 20px;" onclick="closeAlert()">Хорошо</button>
            </div>
        </div>
    </div>

    <div id="congrats-popup" class="popup">
        <div class="popup-layout">
            <img src="../pictures/game4/bear.png" class="popup-elephant" alt="Elephant Victory">
            <div class="popup-content">
                <h1 style="color: #2ed573;">Ура! Правильно!</h1>
                <p style="font-size: 17px; font-weight: 600; color: #1e272e; margin-bottom: 15px;">У тебя отлично получилось! Ответ действительно 9.</p>
                <div style="display:flex; gap:12px; justify-content:flex-start; flex-wrap: wrap;">
                    <button class="btn" style="background:#ff4757; padding: 10px 20px;" onclick="resetGame()">Заново</button>
                    <button class="btn" style="background:#2ed573; padding: 10px 20px;" onclick="window.location.href='X3.html'">Далее</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const answerInput = document.getElementById('answer-input');
        const checkBtn = document.getElementById('check-btn');
        const dimOverlay = document.getElementById('dim-overlay');
        const congratsPopup = document.getElementById('congrats-popup');
        const alertPopup = document.getElementById('alert-popup');
        const alertTitle = document.getElementById('alert-title');
        const alertText = document.getElementById('alert-text');

        // Manage Greeting Intro Lifecycle Fade Out
        setTimeout(() => {
            const intro = document.getElementById('intro-stage');
            if(intro) {
                intro.style.opacity = '0';
                setTimeout(() => intro.remove(), 600);
            }
        }, 4500);

        function triggerElephantAlert(title, message) {
            alertTitle.textContent = title;
            alertText.textContent = message;
            dimOverlay.style.display = 'block';
            alertPopup.style.display = 'block';
        }

        function closeAlert() {
            dimOverlay.style.display = 'none';
            alertPopup.style.display = 'none';
            answerInput.focus();
        }

        function evaluateAnswer() {
            const userAnswer = parseInt(answerInput.value.trim(), 10);

            if (userAnswer === 9) {
                dimOverlay.style.display = 'block';
                congratsPopup.style.display = 'block';
                confetti({ particleCount: 160, spread: 80, origin: { y: 0.6 } });
            } else if (isNaN(userAnswer)) {
                triggerElephantAlert("Внимание!", "Пожалуйста, напиши число в окошко!");
            } else {
                triggerElephantAlert("Попробуй ещё раз!", "Неверно, посчитай буквы внимательнее!");
                answerInput.value = '';
            }
        }

        function resetGame() {
            answerInput.value = '';
            dimOverlay.style.display = 'none';
            congratsPopup.style.display = 'none';
        }

        checkBtn.addEventListener('click', evaluateAnswer);

        answerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                evaluateAnswer();
            }
        });
    </script>
</body>
</html>
