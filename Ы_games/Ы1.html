<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наполняем букву Ы пеной</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #FCE4EC; /* Нежный мыльно-розовый фон */
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Mouse Intro Scene --- */
        #mouse-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; min-height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 110;
            display: flex; /* Сразу показываем экран приветствия мышки */
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .mouse-bubble {
            background: #fff;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            max-width: 600px;
            width: 90%;
            text-align: center;
            border: 8px solid #e84118;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .mouse-bubble img {
            width: 200px;
            height: 200px;
            object-fit: contain;
        }

        .mouse-bubble h2 { font-size: 36px; margin: 0; color: #e84118; }
        .mouse-bubble p { font-size: 24px; line-height: 1.5; margin: 0; }

        /* --- Main Content (Initially hidden by overlay) --- */
        #main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 36px;
            color: #d32f2f;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* Контейнер буквы Ы */
        .letter-container {
            position: relative;
            width: 250px;
            height: 300px;
            margin-bottom: 30px;
            background: transparent;
        }

        /* Контур буквы */
        .letter-outline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 200px;
            font-weight: bold;
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: transparent;
            -webkit-text-stroke: 6px #e84118; /* Красный контур */
            text-stroke: 6px #e84118;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            user-select: none;
            pointer-events: none; /* Чтобы клики проходили сквозь контур к пузырям, если нужно */
        }

        /* Отдельный пузырек */
        .bubble-dot {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff 20%, #e1bee7 60%, #ce93d8 100%);
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.8);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
            z-index: 5;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* Кнопки управления */
        .btn-group {
            display: flex;
            gap: 20px;
            z-index: 15;
        }

        .action-btn {
            padding: 15px 35px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4cd137;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            background-color: #41b52c;
        }

        .action-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .back-btn {
            background-color: #2e86de;
        }
        .back-btn:hover {
            background-color: #256db8;
        }

        /* Мышка в углу */
        #mouse-corner {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: auto;
            animation: floatMouse 3s ease-in-out infinite alternate;
        }

        @keyframes floatMouse {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            .mouse-img { width: 160px; }
        }
    </style>
</head>
<body>

    <div id="mouse-screen">
        <div class="mouse-bubble">
            <img src="pictures/mouse.png" alt="Мышка" onerror="this.src='https://placehold.co/200x200/e84118/ffffff?text=Мышка'">
            <h2>Привет! Я мышка!</h2>
            <p>Давай наполним букву Ы мыльной пеной, а потом поиграем!</p>
            <button class="action-btn" onclick="showMainScreen()">Далее</button>
        </div>
    </div>

    <div id="main-content">
        <div class="title">Прочитай букву Ы, пока она наполняется пеной!</div>

        <div class="letter-container" id="bubble-field">
            <div class="letter-outline">Ы</div>
        </div>

        <div class="btn-group">
            <button id="fill-btn" class="action-btn" onclick="startFilling()">Наполнить</button>
            <button id="next-btn" class="action-btn back-btn" onclick="goToGame()" disabled>Далее</button>
        </div>
    </div>

    <img id="mouse-corner" src="pictures/mouse.png" alt="Мышка" onerror="this.src='https://placehold.co/120x120/e84118/ffffff?text=Мышка'">

    <script>
        function showMainScreen() {
            document.getElementById('mouse-screen').style.display = 'none';
        }

        function startFilling() {
            const fillBtn = document.getElementById('fill-btn');
            const nextBtn = document.getElementById('next-btn');
            const container = document.getElementById('bubble-field');

            fillBtn.disabled = true;
            fillBtn.style.backgroundColor = "#ccc";
            fillBtn.innerText = "Пузыри кипят...";

            // Создаем случайное появление пузырей в случайных местах (всего ~60 штук за 4 секунды)
            let bubblesCount = 0;
            const creationInterval = setInterval(() => {
                if (bubblesCount >= 60) {
                    clearInterval(creationInterval);
                    return;
                }

                const bubble = document.createElement('div');
                bubble.className = 'bubble-dot';

                // Случайный размер пузырька от 20px до 55px
                const size = Math.random() * 35 + 20;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;

                // Случайные координаты внутри контейнера (250x300px)
                const posX = Math.random() * (250 - size);
                const posY = Math.random() * (300 - size);

                bubble.style.left = `${posX}px`;
                bubble.style.top = `${posY}px`;

                container.appendChild(bubble);

                bubblesCount++;
            }, 65); // Интервал спавна ~65мс (60 штук заполнят за ~4 сек)

            // Активируем кнопку перехода после завершения наполнения (через 4 секунды)
            setTimeout(() => {
                nextBtn.disabled = false;
            }, 4000);
        }

        function goToGame() {
            window.location.href = 'Ы2.html'; 
        }
    </script>

</body>
</html>
