<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Игра: Соедини звуки</title>
    <style>
        :root { --bg-image: url('../pictures/background/space_backround.jpeg'); }
        
        body { 
            margin: 0; height: 100vh; overflow: hidden; font-family: sans-serif; 
            background-image: var(--bg-image); background-size: cover; 
            background-position: center; background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5); background-blend-mode: darken;
            touch-action: none;
        }

        /* Template Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { background: #2f2f5f; padding: 40px; border-radius: 20px; text-align: center; border: 3px solid #fff; color: white; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #6e8efb; color: white; border: none; border-radius: 10px; margin: 10px; }

        /* Game Specific Styles */
        #game-area { 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 30px; 
            box-sizing: border-box;
        }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; touch-action: none; }
        .column { display: flex; flex-direction: column; gap: 30px; z-index: 2; }
        
        .node { 
            width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; 
            font-size: 2.5rem; font-weight: bold; border: 4px solid #6e8efb; border-radius: 20px; 
            background: white; cursor: pointer; transition: transform 0.2s;
            user-select: none; -webkit-user-drag: none;
            touch-action: none;
        }
        .node img { width: 90%; height: 90%; object-fit: contain; pointer-events: none; }

        @media (max-width: 600px) {
            #game-area { padding: 15px; }
            .node { width: 80px; height: 80px; font-size: 2rem; border-radius: 15px; }
            .column { gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="start-modal" class="overlay">
        <div class="box">
            <h1>Добро пожаловать!</h1>
            <p>Инструкция: Соедини слог с соответствующей картинкой.</p>
            <button class="btn" onclick="document.getElementById('start-modal').style.display='none'">Играть</button>
        </div>
    </div>

    <div id="game-area">
        <div class="column" id="left-col">
            <div class="node" data-id="СА">СА</div>
            <div class="node" data-id="СО">СО</div>
            <div class="node" data-id="УС">УС</div>
        </div>

        <div class="column" id="right-col">
            <div class="node" data-id="СА"><img src="pictures/boots.png" alt="boots"></div>
            <div class="node" data-id="УС"><img src="../pictures/U/mustage.png" alt="mustage"></div>
            <div class="node" data-id="СО"><img src="pictures/yc.png" alt="yc"></div>
        </div>
    </div>

    <div id="end-modal" class="overlay" style="display: none;">
        <div class="box">
            <h1>Молодец!</h1>
            <button class="btn" onclick="location.reload()">Играть снова</button>
            <button class="btn" onclick="window.location.href='../entrence_pages/C_ekstra07.html'">Следующая страница</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        function shuffleNodes(containerId) {
            const container = document.getElementById(containerId);
            const nodes = Array.from(container.children);
            nodes.sort(() => Math.random() - 0.5).forEach(node => container.appendChild(node));
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, startNode = null, connections = [], mousePos = {x:0, y:0};

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); }
        window.onresize = resize;
        window.onload = () => { shuffleNodes('left-col'); shuffleNodes('right-col'); resize(); };

        function getCenter(el) {
            const rect = el.getBoundingClientRect();
            return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
        }

        function drawLine(p1, p2, color) {
            ctx.beginPath(); ctx.lineWidth = 10; ctx.strokeStyle = color;
            ctx.lineCap = "round"; ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            connections.forEach(c => drawLine(c.start, c.end, "#10b981"));
            if (isDrawing) drawLine(getCenter(startNode), mousePos, "#6e8efb");
        }

        function findNode(x, y) {
            const nodes = document.querySelectorAll('.node');
            return Array.from(nodes).find(n => {
                const r = n.getBoundingClientRect();
                const padding = 10;
                return x >= r.left - padding && x <= r.right + padding && y >= r.top - padding && y <= r.bottom + padding;
            });
        }

        function startInteraction(x, y) {
            startNode = findNode(x, y);
            if (startNode) isDrawing = true;
        }

        function moveInteraction(x, y) {
            if (isDrawing) {
                mousePos = { x: x, y: y }; 
                draw();
            }
        }

        function endInteraction(x, y) {
            if (!isDrawing) return;
            const endNode = findNode(x, y);
            
            if (endNode && endNode !== startNode && endNode.dataset.id === startNode.dataset.id && endNode.parentElement !== startNode.parentElement) {
                connections.push({start: getCenter(startNode), end: getCenter(endNode)});
                if(connections.length === 3) document.getElementById('end-modal').style.display = 'flex';
            }
            isDrawing = false; 
            draw();
        }

        // Mouse Events
        window.onmousedown = (e) => startInteraction(e.clientX, e.clientY);
        window.onmousemove = (e) => moveInteraction(e.clientX, e.clientY);
        window.onmouseup = (e) => endInteraction(e.clientX, e.clientY);

        // Touch Events
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length) {
                startInteraction(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length) {
                moveInteraction(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (e.changedTouches.length) {
                endInteraction(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        }, { passive: false });

        // Prevent default scrolling on canvas area
        document.getElementById('game-area').addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
