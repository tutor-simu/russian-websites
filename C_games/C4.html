<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космик: Поём слоги</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Comic Sans MS', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; position: relative; color: white;
        }

        #welcome-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh; 
            background: rgba(0, 0, 0, 0.7); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .welcome-elephant { width: 250px; animation: floatElem 3s ease-in-out infinite; }
        .welcome-bubble { background: white; border-radius: 30px; padding: 20px 35px; font-size: 28px; color: #1e272e; border: 4px solid #4a69bd; margin: 30px; }
        #start-btn { padding: 20px 60px; font-size: 28px; background-color: #4cd137; color: white; border: none; border-radius: 50px; cursor: pointer; }

        #game-layout { display: none; flex-direction: column; align-items: center; }
        .syllable-display { font-size: 20vw; font-weight: bold; text-shadow: 0 0 20px #6e8efb; }
        .active { color: #6e8efb; }

        #bear-stage { position: absolute; bottom: 5%; left: 3%; display: none; align-items: center; gap: 20px; z-index: 100; }
        .space-bear { width: 140px; animation: floatBear 3s ease-in-out infinite; }
        .speech-bubble { background: white; color: #1e272e; border-radius: 25px; padding: 15px 25px; font-size: 24px; font-weight: bold; border: 3px solid #4a69bd; }

        /* End Screen with Elephant */
        #end-screen { display: none; text-align: center; }
        .end-content { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .end-bubble { background: white; color: #1e272e; border-radius: 25px; padding: 20px; font-size: 24px; font-weight: bold; border: 4px solid #4cd137; }
        
        @keyframes floatElem { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes floatBear { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .button-style { padding: 15px 40px; background-color: #4cd137; color: white; text-decoration: none; border-radius: 50px; font-size: 20px; margin: 10px; cursor: pointer; border: none;}
    </style>
</head>
<body>

    <div id="welcome-screen">
        <img src="pictures/elephant.png" class="welcome-elephant" onerror="this.style.display='none'">
        <div class="welcome-bubble">Давай пропоём слоги вместе!</div>
        <button id="start-btn" onclick="startGame()">Начать петь</button>
    </div>

    <div id="game-layout">
        <div id="syllable-container" class="syllable-display"></div>
    </div>

    <div id="bear-stage">
        <img src="pictures/elephant.png" class="space-bear" onerror="this.style.display='none'">
        <div id="speech-text" class="speech-bubble">Тяни звук!</div>
    </div>

    <div id="end-screen">
        <div class="end-content">
            <img src="pictures/elephant.png" style="width: 200px;" onerror="this.style.display='none'">
            <div class="end-bubble">Молодец! Ты отлично справился!</div>
            <div>
                <button class="button-style" onclick="location.reload()">Ещё раз</button>
                <a href="C5.html" class="button-style">Далее</a>
            </div>
        </div>
    </div>

    <script>
        const syllables = ['АC', 'ОC', 'УC'];
        let currentIdx = 0;

        function startGame() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('game-layout').style.display = 'flex';
            document.getElementById('bear-stage').style.display = 'flex';
            showSyllable();
        }

        async function showSyllable() {
            const container = document.getElementById('syllable-container');
            container.innerHTML = '';
            
            const text = syllables[currentIdx];
            text.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char;
                span.className = 'letter';
                container.appendChild(span);
            });

            const letters = document.querySelectorAll('.letter');
            for(let l of letters) {
                l.classList.add('active');
                await new Promise(r => setTimeout(r, 1000));
            }
            
            await new Promise(r => setTimeout(r, 800));
            confetti({ particleCount: 50, spread: 70, origin: { y: 0.6 } });
            
            currentIdx++;
            if (currentIdx < syllables.length) {
                showSyllable();
            } else {
                document.getElementById('game-layout').style.display = 'none';
                document.getElementById('bear-stage').style.display = 'none';
                document.getElementById('end-screen').style.display = 'block';
            }
        }
    </script>
</body>
</html>
