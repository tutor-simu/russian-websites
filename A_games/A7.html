<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-select=none">
    <title>Читаем букву А</title>
    <style>
        body { 
            margin: 0; padding: 20px; 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            display: flex; flex-direction: column; align-items: center; 
            font-family: sans-serif; min-height: 100vh; 
        }
        .cat-corner { position: fixed; top: 10px; right: 10px; width: 80px; }
        .instruction { font-size: 1.5rem; margin-bottom: 20px; text-align: center; color: #ffeb3b; }

        .reading-area { 
            position: relative; display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px 40px; font-size: 70px; font-weight: bold; 
            color: #4fc3f7; text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
            width: 260px; margin-top: 50px;
        }

        .hand { position: absolute; font-size: 50px; transition: all 0.5s linear; pointer-events: none; }

        button { 
            margin-top: 50px; padding: 15px 40px; font-size: 1.5rem; 
            border-radius: 20px; border: none; background: #e91e63; color: white; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
        }

        /* Popup Styles */
        #popup { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        .popup-content { background: #2c3e50; padding: 40px; border-radius: 20px; text-align: center; }
        #replay-btn { background: #ff9800; }
        #continue-btn { 
            background: #4caf50; 
            border: none; /* Ensure no border */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img src="../pictures/CHARACTERS/astro_cat.png" class="cat-corner" alt="Cat">
    <div class="instruction">А теперь мы по-настоящему будем читать! Это не так сложно! У тебя обязательно получится! Попробуем? 
Ставь палец под первую букву А в каждом ряду, называй её, передвигай палец слева направо под следующие буквы, называй их.</div>

    <div class="reading-area" id="container">
        <span>А</span><span>А</span><span>А</span> <span>А</span><span>А</span> <span>А</span><span>А</span><span>А</span> 
        <div id="hand" class="hand" style="top: 80px; left: 10px;">☝️</div>
    </div>

    <button id="start-btn" onclick="startExercise()">Начать</button>

    <div id="popup">
        <div class="popup-content">
            <h2>Отлично!</h2>
            <button id="replay-btn" onclick="location.reload()">Играть еще</button>
            <br><br>
            <a href="../entrence_pages/O.html" style="text-decoration: none;">
                <button id="continue-btn">Дальше</button>
            </a>
        </div>
    </div>

    <audio id="a-audio" src="../pictures/game6/Asound.mp3" preload="auto"></audio>

    <script>
        async function startExercise() {
            const hand = document.getElementById('hand');
            const audio = document.getElementById('a-audio');
            const spans = document.querySelectorAll('.reading-area span');
            const container = document.getElementById('container');
            const startBtn = document.getElementById('start-btn');
            const popup = document.getElementById('popup');
            
            startBtn.style.display = 'none';
            let lastTop = -1;

            for (let i = 0; i < spans.length; i++) {
                const rect = spans[i].getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                
                const newLeft = rect.left - containerRect.left + 10;
                const newTop = rect.top - containerRect.top + 70;

                hand.style.transition = (lastTop !== -1 && newTop > lastTop) ? 'none' : 'all 0.5s linear';
                hand.style.left = newLeft + 'px';
                hand.style.top = newTop + 'px';

                hand.offsetHeight; 
                if (hand.style.transition === 'none') hand.style.transition = 'all 0.5s linear';

                audio.currentTime = 0;
                audio.play();
                lastTop = newTop;

                await new Promise(resolve => setTimeout(resolve, 1500));
            }
            
            // Show the popup when finished
            popup.style.display = 'flex';
        }
    </script>
</body>
</html>
