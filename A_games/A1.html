<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Rescue - game2</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; 
            background: url('../pictures/background/space_backround.jpeg') no-repeat center center fixed; 
            background-size: cover; 
            position: relative;
        }

        #cat {
            position: absolute; 
            top: 410px;
            left: 380px;
            width: 150px;
            cursor: grab; 
            z-index: 20;
            transition: opacity 0.3s, filter 0.3s;
        }

        /* Locked state preventing drag while audio plays */
        #cat.locked {
            pointer-events: none;
            opacity: 0.6;
            filter: grayscale(0.5);
            cursor: default;
        }

        #ship-container {
            position: absolute; 
            bottom: 150px;
            right: 220px; 
            width: 180px; 
            height: 330px; 
            transform-origin: center center; 
        }

        #rocket-img, #cat-on-ship { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            transition: opacity 0.5s;
        }
        
        #cat-on-ship { 
            display: none; 
            opacity: 0; 
            transition: opacity 0.5s ease-in-out;
        }
        
        #explosion-container {
            position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%); width: 20px; height: 20px;
        }

        .particle {
            position: absolute; width: 10px; height: 10px;
            background: radial-gradient(circle, #ffcc00, #ff4500);
            border-radius: 50%;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    
        @keyframes launchPath {
            0%   { transform: translate(0, 0) rotate(0deg); animation-timing-function: linear; }
            12%  { transform: translate(120px, -140px) rotate(45deg); animation-timing-function: linear; }
            24%  { transform: translate(220px, -70px) rotate(135deg); animation-timing-function: linear; }
            36%  { transform: translate(120px, 40px) rotate(210deg); animation-timing-function: linear; }
            45%  { transform: translate(0px, 120px) rotate(315deg); animation-timing-function: linear; }
            56%  { transform: translate(-120px, 40px) rotate(330deg); animation-timing-function: linear; }
            68%  { transform: translate(-220px, -70px) rotate(450deg); animation-timing-function: linear; }
            80%  { transform: translate(-120px, -140px) rotate(540deg); animation-timing-function: linear; }
            90%  { transform: translate(0, 0) rotate(720deg); animation-timing-function: ease-in; }
            100% { transform: translate(0, -130vh) rotate(720deg); }
        }

        .launch {
            animation: launchPath 6s linear forwards;
        }
        
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            top: -10px; 
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Mobile responsiveness adjustments */
        @media (max-width: 900px) {
            #cat {
                top: 50vh;
                left: 10vw;
            }
            #ship-container {
                bottom: 50px;
                right: 5vw;
            }
        }
    </style>
</head>
<body>

    <audio id="entrance-audio" src="../audios/entrence.mp3" autoplay></audio>

    <img id="cat" src="../pictures/CHARACTERS/astro_cat.png" alt="Cat" draggable="true" class="locked">

    <div id="ship-container">
        <img id="rocket-img" src="../pictures/rackets/racket.png" alt="Rocket">
        <img id="cat-on-ship" src="../pictures/rackets/finalgame1Ship.png" alt="Cat in Ship">
        <div id="explosion-container"></div>
    </div>

    <div id="confetti-container"></div>

    <script>
        const cat = document.getElementById('cat');
        const container = document.getElementById('ship-container');
        const rocket = document.getElementById('rocket-img');
        const catOnShip = document.getElementById('cat-on-ship');
        const explosionContainer = document.getElementById('explosion-container');
        const entranceAudio = document.getElementById('entrance-audio');

        // State management
        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;

        cat.style.touchAction = "none";
        cat.style.position = "absolute"; 

        // Function to attempt audio playback safely across browsers
        function playAudio() {
            entranceAudio.play().then(() => {
                // If it successfully plays, clean up the manual click backups
                document.removeEventListener('click', playAudio);
                document.removeEventListener('pointerdown', playAudio);
            }).catch(error => {
                console.log("Autoplay blocked. Waiting for first interaction to play sound.");
            });
        }

        // Run play sequence on load
        playAudio();

        // Fallback: If autoplay fails, the very first screen interaction fires the audio
        document.addEventListener('click', playAudio);
        document.addEventListener('pointerdown', playAudio);

        // Unlock the cat ONLY when the audio file completely finishes sounding
        entranceAudio.addEventListener('ended', () => {
            cat.classList.remove('locked');
        });

        cat.addEventListener('pointerdown', (e) => {
            if (cat.classList.contains('locked')) return;
            isDragging = true;
            const rect = cat.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            
            cat.setPointerCapture(e.pointerId);
        });

        cat.addEventListener('pointermove', (e) => {
            if (!isDragging || cat.classList.contains('locked')) return;
            
            cat.style.left = (e.clientX - offsetX) + 'px';
            cat.style.top = (e.clientY - offsetY) + 'px';
        });

        cat.addEventListener('pointerup', (e) => {
            if (!isDragging || cat.classList.contains('locked')) return;
            isDragging = false;
            
            const shipRect = container.getBoundingClientRect();
            
            if (e.clientX >= shipRect.left && e.clientX <= shipRect.right &&
                e.clientY >= shipRect.top && e.clientY <= shipRect.bottom) {
                
                triggerLaunchSequence();
            } else {
                cat.style.left = '380px';
                cat.style.top = '410px';
            }
        });

        function triggerLaunchSequence() {
            cat.style.display = "none";
            rocket.style.display = "none";
            catOnShip.style.display = "block";
            
            setTimeout(() => {
                catOnShip.style.opacity = "1";
            }, 50);
            
            setTimeout(() => {
                createExplosion(); 
                container.classList.add('launch');
            }, 500);

            setTimeout(() => {
                createConfetti();
                setTimeout(() => {
                    location.href = 'A2.html';
                }, 2500); 
            }, 5500);
        }

        function createExplosion() {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                particle.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                explosionContainer.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        }

        function createConfetti() {
            const cContainer = document.getElementById('confetti-container');
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDelay = Math.random() * 2 + 's';
                cContainer.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }
    </script>
</body>
</html>
