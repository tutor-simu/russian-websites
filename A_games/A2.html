<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космическая Раскраска - Буква А</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #121224, #1a1a3a);
            font-family: sans-serif;
            display: flex;
        }

        /* Canvas Workspace Area */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        #title-bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #1a1a3a;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        canvas {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            cursor: bucket;
            max-width: 100%;
            max-height: 75vh;
        }

        #palette-sidebar {
            width: 130px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-sizing: border-box;
            z-index: 10;
            height: auto; /* Changed from 100vh to auto */
            min-height: 100vh; /* Ensures it still covers the full height if needed */
            overflow-y: auto; /* Ensures the sidebar itself can scroll if its content is too long */
        }

        /* NEW: Scrolling container specifically for color circles */
        .swatch-container {
            width: 100%;
            flex: 1; /* Takes up all available space between the header and buttons */
            overflow-y: auto; /* Adds the vertical scrollbar when contents overflow */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
            margin-bottom: 15px;
            
            /* Custom minimalist scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }

        /* Webkit custom scrollbar mapping for Chrome/Safari/Edge */
        .swatch-container::-webkit-scrollbar {
            width: 6px;
        }
        .swatch-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .sidebar-label {
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .color-swatch {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .color-swatch:hover {
            transform: scale(1.15);
        }

        .color-swatch.active {
            border-color: #ffffff;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        #reset-btn {
            margin-top: auto;
            padding: 12px 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
        }

        #reset-btn:hover {
            background: #ff6b81;
            transform: translateY(-2px);
        }
        
        #reset-btn:active {
            transform: translateY(0);
        }
        #next-btn {
            margin-top: 10px;
            padding: 12px 20px;
            background: #2ed573; /* Green for success/next steps */
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);
            width: 85%; /* Makes it fit nicely in the sidebar */
            text-align: center;
        }

        #next-btn:hover {
            background: #26af5f;
            transform: translateY(-2px);
        }

        #next-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="title-bubble">Раскрась букву А!</div>
        <canvas id="coloringCanvas"></canvas>
    </div>

    <div id="palette-sidebar">
        <div class="sidebar-label">Цвета</div>
        
        <div class="swatch-container">
            <div class="color-swatch active" style="background-color: #ff4757;" data-color="#ff4757"></div>
            <div class="color-swatch" style="background-color: #2ed573;" data-color="#2ed573"></div>
            <div class="color-swatch" style="background-color: #1e90ff;" data-color="#1e90ff"></div>
            <div class="color-swatch" style="background-color: #ffa502;" data-color="#ffa502"></div>
            <div class="color-swatch" style="background-color: #9b59b6;" data-color="#9b59b6"></div>
            <div class="color-swatch" style="background-color: #00d2d3;" data-color="#00d2d3"></div>
            <div class="color-swatch" style="background-color: #ff6b81;" data-color="#ff6b81"></div>
            <div class="color-swatch" style="background-color: #eccc68;" data-color="#eccc68"></div>
            <div class="color-swatch" style="background-color: #70a1ff;" data-color="#70a1ff"></div>
            <div class="color-swatch" style="background-color: #7bed9f;" data-color="#7bed9f"></div>
            <div class="color-swatch" style="background-color: #ff7f50;" data-color="#ff7f50"></div>
            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff"></div>
            <div class="color-swatch" style="background-color: #a4b0be;" data-color="#a4b0be"></div>
        </div>
        
        <button id="reset-btn">Сбросить</button>
        <button id="next-btn" style="display: none;" onclick="location.href='A3.html'">Следующее занятие</button>
    </div>

    <script>
        const canvas = document.getElementById('coloringCanvas');
        const ctx = canvas.getContext('2d');
        const swatches = document.querySelectorAll('.color-swatch');
        const resetBtn = document.getElementById('reset-btn');

        let selectedColor = { r: 255, g: 71, b: 87 }; // Default #ff4757 RGB value
        const rocketImage = new Image();
        
        // POINT THIS TO YOUR ROCKET FILE PATH EXACTLY (No leading slash)
        rocketImage.src = '../pictures/rackets/racketcoloring2.png'; 

        // Set up canvas scale dimensions when the image loads
        rocketImage.onload = () => {
            canvas.width = rocketImage.naturalWidth || 600;
            canvas.height = rocketImage.naturalHeight || 800;
            resetCanvas();
        };

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw your clean rocket line-art onto the workspace board
            ctx.drawImage(rocketImage, 0, 0, canvas.width, canvas.height);
        }

        // Convert Hex Strings (#ffffff) to RGB targets ({r:255, g:255, b:255})
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        // Color Palette Click Listener 
        swatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelector('.color-swatch.active').classList.remove('active');
                swatch.classList.add('active');
                const hexValue = swatch.getAttribute('data-color');
                selectedColor = hexToRgb(hexValue);
            });
        });

        // Flood Fill Algorithm Engine
        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;

            // Get target start pixel index position
            const startPos = (startY * width + startX) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            const startA = data[startPos + 3];

            // Safety Guard: Don't fill if user clicks on an area already matching the color
            if (startR === fillColor.r && startG === fillColor.g && startB === fillColor.b) return;

            // Avoid overwriting or bleeding into the pure black lines (#000000)
            // This threshold determines what counts as a "border line"
            if (startR < 50 && startG < 50 && startB < 50 && startA > 200) return;

            const queue = [[startX, startY]];

            while (queue.length > 0) {
                const [x, y] = queue.shift();
                let currentY = y;

                // Move up as far as possible within the same color zone
                while (currentY >= 0 && matchStartColor(currentY * width + x)) {
                    currentY--;
                }
                currentY++;

                let reachLeft = false;
                let reachRight = false;

                // Move down, filling pixels and checking side expansions
                while (currentY < height && matchStartColor(currentY * width + x)) {
                    const pos = (currentY * width + x) * 4;
                    
                    // Apply new colors
                    data[pos] = fillColor.r;
                    data[pos + 1] = fillColor.g;
                    data[pos + 2] = fillColor.b;
                    data[pos + 3] = 255;

                    // Evaluate Left Column Bounds
                    if (x > 0) {
                        if (matchStartColor(currentY * width + (x - 1))) {
                            if (!reachLeft) {
                                queue.push([x - 1, currentY]);
                                reachLeft = true;
                            }
                        } else if (reachLeft) {
                            reachLeft = false;
                        }
                    }

                    // Evaluate Right Column Bounds
                    if (x < width - 1) {
                        if (matchStartColor(currentY * width + (x + 1))) {
                            if (!reachRight) {
                                queue.push([x + 1, currentY]);
                                reachRight = true;
                            }
                        } else if (reachRight) {
                            reachRight = false;
                        }
                    }

                    currentY++;
                }
            }

            // Update canvas with newly painted pixel matrix modifications
            ctx.putImageData(imageData, 0, 0);

            function matchStartColor(pixelIndex) {
                const p = pixelIndex * 4;
                // Returns true if the pixel matches the color where the user originally clicked
                // A slight color tolerance (20) prevents getting stuck on compression artifacts
                return Math.abs(data[p] - startR) < 20 &&
                       Math.abs(data[p + 1] - startG) < 20 &&
                       Math.abs(data[p + 2] - startB) < 20 &&
                       data[p + 3] > 100;
            }
        }

        // Capture Click/Tap coordinates inside the canvas matrix bounds
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);

            // Fire coloring bucket engine execution
            floodFill(x, y, selectedColor);

            // REVEAL BUTTON: Show the "Next Class" button after they start coloring
            document.getElementById('next-btn').style.display = 'block';
        });

        resetBtn.addEventListener('click', resetCanvas);
    </script>
</body>
</html>
