<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Читаем букву О</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px 20px 80px 20px; /* Extra bottom padding to prevent overlap with the cat */
            background: #ffffff; 
            color: #000000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            font-family: 'Comic Sans MS', sans-serif, cursive; 
            min-height: 100vh; 
            box-sizing: border-box;
            overflow-x: hidden;
        }
        
        .cat-corner { 
            position: fixed; 
            bottom: 10px; 
            left: 10px; 
            width: 70px; 
            z-index: 50;
        }
        
        .instruction { 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
            text-align: center; 
            color: #005b96; 
            font-weight: bold;
            max-width: 800px;
            margin-top: 20px;
        }
        
        /* Reading area configured for rows */
        .reading-area { 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 400px;
            margin-top: 20px; 
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
        }
        
        .reading-area span {
            font-size: 85px; 
            font-weight: bold; 
            color: #ff6b6b; 
            text-align: center;
            user-select: none;
            width: 70px;
            display: inline-block;
            line-height: 1;
        }
        
        .hand { 
            position: absolute; 
            font-size: 55px; 
            transition: all 0.5s linear; 
            pointer-events: none; 
            z-index: 10;
        }
        
        button { 
            margin-top: 30px; 
            padding: 18px 40px; 
            font-size: 1.5rem; 
            border-radius: 20px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        
        #start-btn { 
            background: #2ed573; 
            color: white; 
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3); 
        }

        /* Popup Styles */
        #popup { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.6); 
            justify-content: center; 
            align-items: center; 
            z-index: 100;
        }
        
        .popup-content { 
            background: #ffffff; 
            padding: 30px 20px; 
            border-radius: 25px; 
            text-align: center; 
            border: 4px solid #ff4757;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 85%;
            width: 360px;
            box-sizing: border-box;
        }

        .popup-content h2 {
            font-size: 2.5rem;
            color: #ff4757;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .popup-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        #replay-btn { 
            background: #ff9800; 
            color: white; 
            margin-top: 0;
            padding: 12px 20px;
            font-size: 1.1rem;
        }
        
        #continue-btn { 
            background: #4caf50; 
            color: white; 
            margin-top: 0;
            padding: 12px 25px;
            font-size: 1.1rem;
        }

        /* Mobile Adjustments to strictly fit phone screens */
        @media (max-width: 450px) {
            .instruction { font-size: 1.4rem; }
            .reading-area span { font-size: 65px; width: 55px; }
            .row { gap: 25px; }
            .hand { font-size: 45px; }
            .cat-corner { width: 55px; }
            button { padding: 14px 30px; font-size: 1.2rem; }
            .popup-content { padding: 25px 15px; }
            .popup-content h2 { font-size: 2rem; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <img src="../pictures/CHARACTERS/astro_cat.png" class="cat-corner" alt="Cat">
    <div class="instruction">Прочитай, ставь пальчик под букву и называй О.</div>

    <div class="reading-area" id="container">
        <div class="row"><span>О</span><span>О</span><span>О</span></div>
        <div class="row"><span>О</span><span>О</span></div>
        <div class="row"><span>О</span><span>О</span><span>О</span></div>
        
        <div id="hand" class="hand" style="display: none;">👆</div>
    </div>

    <button id="start-btn" onclick="startExercise()">Начать</button>

    <div id="popup">
        <div class="popup-content">
            <h2>Отлично!</h2>
            <div class="popup-buttons">
                <button id="replay-btn" onclick="location.reload()">Играть снова</button>
                <button id="continue-btn" onclick="location.href='../entrence_pages/U.html'">Дальше</button>
            </div>
        </div>
    </div>

    <audio id="o-audio" src="../pictures/O/Osound.mp3" preload="auto"></audio>

    <script>
        async function startExercise() {
            const hand = document.getElementById('hand');
            const audio = document.getElementById('o-audio');
            const spans = document.querySelectorAll('.reading-area span');
            const container = document.getElementById('container');
            const startBtn = document.getElementById('start-btn');
            const popup = document.getElementById('popup');
            
            startBtn.style.display = 'none';
            hand.style.display = 'block';
            let lastTop = -1;

            for (let i = 0; i < spans.length; i++) {
                const rect = spans[i].getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                
                // Dynamically calculate the center position right below each letter
                const newLeft = rect.left - containerRect.left + (rect.width / 2) - 25;
                const newTop = rect.top - containerRect.top + rect.height - 10;

                // Disable transitions when jumping down to a new row line to prevent unnatural diagonal sliding
                hand.style.transition = (lastTop !== -1 && newTop > lastTop) ? 'none' : 'all 0.5s linear';
                hand.style.left = newLeft + 'px';
                hand.style.top = newTop + 'px';

                hand.offsetHeight; // Force layout reflow
                if (hand.style.transition === 'none') hand.style.transition = 'all 0.5s linear';

                audio.currentTime = 0;
                audio.play();
                
                lastTop = newTop;

                await new Promise(resolve => setTimeout(resolve, 1500));
            }
            
            popup.style.display = 'flex';
        }
    </script>
</body>
</html>
