<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космическая Раскраска - Буква О</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #121224, #1a1a3a);
            font-family: sans-serif;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            height: 100vh;
        }

        #title-bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 25px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #1a1a3a;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 5;
        }

        canvas {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            width: 100%;
            height: 100%;
            max-width: 70vh;
            max-height: 68vh;
            object-fit: contain;
        }

        #palette-sidebar {
            width: 140px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            box-sizing: border-box;
            z-index: 10;
            height: 100vh;
        }

        .swatch-container {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            margin-bottom: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }

        .swatch-container::-webkit-scrollbar {
            width: 6px;
        }
        .swatch-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .sidebar-label {
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .color-swatch {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .color-swatch:hover, .color-swatch.active {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 8px;
            margin-top: auto;
        }

        #reset-btn, #next-btn {
            padding: 10px 12px;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        #reset-btn {
            background: #ff4757;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
        }

        #reset-btn:hover { background: #ff6b81; }

        #next-btn {
            background: #2ed573;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);
        }

        #next-btn:hover { background: #26af5f; }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: hidden;
            }

            #game-container {
                flex: none;
                height: 72vh;
                padding: 5px 10px;
            }

            #title-bubble {
                font-size: 16px;
                padding: 6px 20px;
                margin-bottom: 5px;
            }

            canvas {
                max-width: 100%;
                max-height: 62vh;
            }

            #palette-sidebar {
                width: 100%;
                height: 28vh;
                border-left: none;
                border-top: 2px solid rgba(255, 255, 255, 0.1);
                padding: 8px 10px;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
            }

            .sidebar-label {
                display: none;
            }

            .swatch-container {
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                justify-content: flex-start;
                padding: 2px 0;
                margin-bottom: 0;
                width: 68%;
                height: 55px;
                gap: 8px;
            }

            .color-swatch {
                width: 40px;
                height: 40px;
            }

            .btn-group {
                width: 28%;
                flex-direction: column;
                gap: 5px;
                margin-top: 0;
            }

            #reset-btn, #next-btn {
                padding: 8px 4px;
                font-size: 11px;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="title-bubble">Раскрась букву О!</div>
        <canvas id="coloringCanvas"></canvas>
    </div>

    <div id="palette-sidebar">
        <div class="sidebar-label">Цвета</div>
        
        <div class="swatch-container">
            <div class="color-swatch active" style="background-color: #ff4757;" data-color="#ff4757"></div>
            <div class="color-swatch" style="background-color: #2ed573;" data-color="#2ed573"></div>
            <div class="color-swatch" style="background-color: #1e90ff;" data-color="#1e90ff"></div>
            <div class="color-swatch" style="background-color: #ffa502;" data-color="#ffa502"></div>
            <div class="color-swatch" style="background-color: #9b59b6;" data-color="#9b59b6"></div>
            <div class="color-swatch" style="background-color: #00d2d3;" data-color="#00d2d3"></div>
            <div class="color-swatch" style="background-color: #ff6b81;" data-color="#ff6b81"></div>
            <div class="color-swatch" style="background-color: #eccc68;" data-color="#eccc68"></div>
            <div class="color-swatch" style="background-color: #70a1ff;" data-color="#70a1ff"></div>
            <div class="color-swatch" style="background-color: #7bed9f;" data-color="#7bed9f"></div>
            <div class="color-swatch" style="background-color: #ff7f50;" data-color="#ff7f50"></div>
            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff"></div>
            <div class="color-swatch" style="background-color: #a4b0be;" data-color="#a4b0be"></div>
        </div>
        
        <div class="btn-group">
            <button id="reset-btn">Сбросить</button>
            <button id="next-btn" style="display: none;" onclick="location.href='O3.html'">Далее</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coloringCanvas');
        const ctx = canvas.getContext('2d');
        const swatches = document.querySelectorAll('.color-swatch');
        const resetBtn = document.getElementById('reset-btn');

        let selectedColor = { r: 255, g: 71, b: 87 }; 
        const letterImage = new Image();
        
        letterImage.src = '../pictures/O/o_coloring.png'; 

        letterImage.onload = () => {
            canvas.width = letterImage.naturalWidth || 600;
            canvas.height = letterImage.naturalHeight || 800;
            resetCanvas();
        };

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(letterImage, 0, 0, canvas.width, canvas.height);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        swatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelector('.color-swatch.active').classList.remove('active');
                swatch.classList.add('active');
                const hexValue = swatch.getAttribute('data-color');
                selectedColor = hexToRgb(hexValue);
            });
        });

        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;

            const startPos = (startY * width + startX) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            const startA = data[startPos + 3];

            if (startR === fillColor.r && startG === fillColor.g && startB === fillColor.b) return;
            if (startR < 50 && startG < 50 && startB < 50 && startA > 200) return;

            const queue = [[startX, startY]];

            while (queue.length > 0) {
                const [x, y] = queue.shift();
                let currentY = y;

                while (currentY >= 0 && matchStartColor(currentY * width + x)) {
                    currentY--;
                }
                currentY++;

                let reachLeft = false;
                let reachRight = false;

                while (currentY < height && matchStartColor(currentY * width + x)) {
                    const pos = (currentY * width + x) * 4;
                    
                    data[pos] = fillColor.r;
                    data[pos + 1] = fillColor.g;
                    data[pos + 2] = fillColor.b;
                    data[pos + 3] = 255;

                    if (x > 0) {
                        if (matchStartColor(currentY * width + (x - 1))) {
                            if (!reachLeft) {
                                queue.push([x - 1, currentY]);
                                reachLeft = true;
                            }
                        } else if (reachLeft) {
                            reachLeft = false;
                        }
                    }

                    if (x < width - 1) {
                        if (matchStartColor(currentY * width + (x + 1))) {
                            if (!reachRight) {
                                queue.push([x + 1, currentY]);
                                reachRight = true;
                            }
                        } else if (reachRight) {
                            reachRight = false;
                        }
                    }

                    currentY++;
                }
            }

            ctx.putImageData(imageData, 0, 0);

            function matchStartColor(pixelIndex) {
                const p = pixelIndex * 4;
                return Math.abs(data[p] - startR) < 20 &&
                       Math.abs(data[p + 1] - startG) < 20 &&
                       Math.abs(data[p + 2] - startB) < 20 &&
                       data[p + 3] > 100;
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);

            floodFill(x, y, selectedColor);
            document.getElementById('next-btn').style.display = 'block';
        });

        resetBtn.addEventListener('click', resetCanvas);
    </script>
</body>
</html>
