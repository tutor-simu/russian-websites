<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: url('../pictures/background/space_backround111.jpeg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .cloud-container {
            position: absolute;
            width: 280px;
            height: 180px;
            /* Using your image as the cloud background */
            background: url('../pictures/O/cloude.png') no-repeat center center;
            background-size: contain;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .guide-o {
            font-size: 80px;
            color: rgba(0, 0, 0, 0.6);
            /* Centering the guide O */
            pointer-events: none;
            z-index: 1;
        }

        .cloud-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: crosshair;
            touch-action: none;
            z-index: 2;
        }

        #congrats-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .btn {
            padding: 12px 20px; margin: 10px; border: none; border-radius: 15px;
            background: #6e8efb; color: white; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="cloud-container" style="top: 5%; left: 5%;"><div class="guide-o">O</div><canvas class="cloud-canvas"></canvas></div>
    <div class="cloud-container" style="top: 10%; left: 60%;"><div class="guide-o">O</div><canvas class="cloud-canvas"></canvas></div>
    <div class="cloud-container" style="top: 40%; left: 35%;"><div class="guide-o">O</div><canvas class="cloud-canvas"></canvas></div>
    <div class="cloud-container" style="top: 65%; left: 5%;"><div class="guide-o">O</div><canvas class="cloud-canvas"></canvas></div>
    <div class="cloud-container" style="top: 60%; left: 65%;"><div class="guide-o">O</div><canvas class="cloud-canvas"></canvas></div>

    <div id="congrats-popup">
        <h1 style="color: #6e8efb;">Well Done! 🎉</h1>
        <button class="btn" onclick="location.reload()">Try again</button>
        <button class="btn" onclick="window.location.href='O3.html'">Next</button>
    </div>

    <script>
        let completed = 0;
        const total = 5;

        document.querySelectorAll('.cloud-canvas').forEach(canvas => {
            canvas.width = 280; canvas.height = 180;
            const ctx = canvas.getContext('2d');
            let isDrawing = false, hasDrawn = false;
            
            // Set yellow color and increased thickness
            ctx.strokeStyle = '#FFD700'; 
            ctx.lineWidth = 15; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, 
                         y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
            };

            const start = (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); };
            const draw = (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const end = () => { 
                if (isDrawing && !hasDrawn) { hasDrawn = true; completed++; checkAll(); }
                isDrawing = false; 
            };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
            canvas.addEventListener('touchend', end);
        });

        function checkAll() {
            if (completed === total) {
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                setTimeout(() => document.getElementById('congrats-popup').style.display = 'block', 800);
            }
        }
    </script>
</body>
</html>
