<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Найди букву Р</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #0b0b1e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
        }

        #target-box {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #00d2d3;
            border-radius: 20px;
            width: 120px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1e272e;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        #target-letter {
            font-size: 60px;
            line-height: 1;
            color: #1e90ff;
        }

        .target-label {
            font-size: 12px;
            text-transform: uppercase;
            margin-top: 5px;
            color: #57606f;
        }

        #letters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 500px;
            width: 100%;
            justify-items: center;
        }

        .letter-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e272e;
            font-size: 50px;
            font-weight: 800;
            cursor: default;
            user-select: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 3px solid transparent;
            position: relative;
        }

        .letter-card.crossed {
            background: #ff4757;
            color: #ffffff;
            opacity: 0.7;
            border-color: #fff;
        }

        .letter-card.crossed::before, 
        .letter-card.crossed::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 6px;
            background: white;
            top: 50%;
            left: 10%;
            border-radius: 3px;
        }

        .letter-card.crossed::before { transform: rotate(45deg); }
        .letter-card.crossed::after { transform: rotate(-45deg); }

        /* Variations */
        .mirrored { transform: scaleX(-1); }

        #sidebar {
            width: 200px;
            background: rgba(11, 11, 30, 0.65);
            backdrop-filter: blur(20px);
            border-left: 3px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
            justify-content: space-between;
        }

        .btn {
            padding: 15px 25px;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }

        #check-btn { background: #2ed573; }
        #check-btn:hover { background: #26af5f; transform: translateY(-2px); }

        #reset-btn { background: #ff4757; }
        #reset-btn:hover { background: #ff6b81; transform: translateY(-2px); }

        /* Popups */
        .popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 30px;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 5px solid #6e8efb;
            text-align: center;
            font-family: 'Nunito', sans-serif;
            color: #1e272e;
        }

        #dim-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            #game-container { height: auto; padding: 10px; }
            #letters-grid { grid-template-columns: repeat(3, 1fr); max-width: 400px; }
            #sidebar { width: 100%; height: auto; flex-direction: row; gap: 15px; padding: 15px; border-top: 3px solid rgba(255, 255, 255, 0.15); border-left: none; }
        }
    </style>
</head>
<body>

    <div id="dim-overlay"></div>

    <div id="congrats-popup" class="popup">
        <h1 style="color: #2ed573; margin-top: 0;">Молодец!</h1>
        <p style="font-size: 18px; font-weight: 600;">Ты правильно нашёл и перечеркнул все неправильные буквы!</p>
        <a href="P4.html" class="btn" style="background:#2ed573; margin-top: 20px;">Далее</a>
    </div>

    <div id="game-container">
        <div id="target-box">
            <div id="target-letter">Р</div>
            <div class="target-label">Образец</div>
        </div>
        
        <p style="font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center;">Найди и перечеркни все неправильные буквы</p>

        <div id="letters-grid">
            <div class="letter-card" data-correct="true">Р</div>
            <div class="letter-card" data-correct="true">Р</div>
            <div class="letter-card mirrored" data-correct="false">Р</div>
            
            <div class="letter-card" data-correct="true">Р</div>
            <div class="letter-card mirrored" data-correct="false">Р</div>
            <div class="letter-card" data-correct="false">R</div>
            
            <div class="letter-card" data-correct="true">Р</div>
            <div class="letter-card" data-correct="true">Р</div>
            <div class="letter-card mirrored" data-correct="false" style="transform: scaleX(-1) rotate(180deg);">Я</div>

            <div class="letter-card" data-correct="false">R</div>
            <div class="letter-card" data-correct="false">B</div>
            <div class="letter-card" data-correct="true">Р</div>
        </div>
    </div>

    <div id="sidebar">
        <button id="check-btn" class="btn">Проверить</button>
        <button id="reset-btn" class="btn">Сбросить</button>
    </div>

    <script>
        const cards = document.querySelectorAll('.letter-card');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Toggle crossing out on cards
        cards.forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('crossed');
            });
        });

        checkBtn.addEventListener('click', () => {
            let allCorrect = true;

            cards.forEach(card => {
                const isCorrectLetter = card.getAttribute('data-correct') === 'true';
                const isCrossed = card.classList.contains('crossed');

                // Error condition: if it's correct but crossed out OR if it's incorrect but NOT crossed out
                if ((isCorrectLetter && isCrossed) || (!isCorrectLetter && !isCrossed)) {
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                document.getElementById('dim-overlay').style.display = 'block';
                confetti({ particleCount: 180, spread: 80, origin: { y: 0.55 } });
                document.getElementById('congrats-popup').style.display = 'block';
            } else {
                alert("Ошибка! Проверь, все ли перечеркнутые буквы на самом деле неверные, и не пропустил ли ты лишнюю.");
            }
        });

        resetBtn.addEventListener('click', () => {
            cards.forEach(card => {
                card.classList.remove('crossed');
            });
        });
    </script>
</body>
</html>
