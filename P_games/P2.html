<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космические Игры - Буква Р | Bilingvi Online</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('../pictures/background/space_backround.jpeg') center center/cover no-repeat fixed;
            background-color: #0b0b1e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
        }

        /* Cinematic Intro Animation */
        #intro-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 50px;
            box-sizing: border-box;
            background: rgba(11, 11, 30, 0.4);
            transition: opacity 0.5s ease;
        }

        .robot-container {
            display: flex;
            align-items: center;
            gap: 20px;
            position: absolute;
            bottom: 15%; left: 10%;
            animation: float 4s ease-in-out infinite;
        }

        .space-robot {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .speech-bubble {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            font-size: 24px;
            font-weight: 800;
            color: #1e272e;
            position: relative;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid #4a69bd;
            opacity: 0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -15px; top: 50%;
            transform: translateY(-50%);
            border-width: 15px 15px 15px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }

        /* Main Workspace Container */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            opacity: 0;
            animation: fadeInWorkspace 1s ease forwards 3.5s;
        }

        #title-bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 14px 40px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 800;
            color: #1e272e;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid #2ed573;
            text-align: center;
            z-index: 5;
            max-width: 80%;
        }

        .game-layer {
            display: none;
            width: 100%;
            height: 100%;
            max-width: 85vh;
            max-height: 75vh;
            justify-content: center;
            align-items: center;
        }

        .game-layer.active {
            display: flex;
        }

        /* Stage 1: Coloring */
        canvas#coloringCanvas {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            cursor: crosshair;
            width: 100%; height: 100%;
            object-fit: contain;
            border: 4px solid rgba(255,255,255,0.2);
        }

        /* Stage 2: Tracing */
        #tracing-grid {
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: 15px;
        }

        .trace-container {
            position: relative;
            width: 140px;
            height: 190px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.5);
        }

        .guide-letter {
            font-size: 85px; 
            color: #e3e3e3;
            font-weight: 800;
            user-select: none;
            position: absolute;
            z-index: 1;
        }

        .trace-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: crosshair;
            touch-action: none;
            z-index: 2;
        }

        /* Sidebar Palette & Navigation Panel */
        #palette-sidebar {
            width: 150px;
            background: rgba(11, 11, 30, 0.65);
            backdrop-filter: blur(20px);
            border-left: 3px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 12px;
            box-sizing: border-box;
            z-index: 10;
            height: 100vh;
            opacity: 0;
            animation: fadeInWorkspace 1s ease forwards 3.5s;
        }

        .swatch-container {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .sidebar-label {
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .color-swatch {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .color-swatch.active {
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            transform: scale(1.1);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            padding: 15px 15px;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #reset-btn { background: #ff4757; }
        #reset-btn:hover { background: #ff6b81; transform: translateY(-2px); }

        #next-btn { background: #2ed573; display: none; }
        #next-btn:hover { background: #26af5f; transform: translateY(-2px); }

        /* Popups */
        .popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 30px;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 5px solid #6e8efb;
            text-align: center;
            font-family: 'Nunito', sans-serif;
        }

        .popup h1 { margin-top: 0; font-weight: 800; color: #1e272e;}

        #dim-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        /* Animations & Responsiveness */
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes popIn { to { opacity: 1; transform: scale(1); } }
        @keyframes fadeInWorkspace { to { opacity: 1; pointer-events: auto; } }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            #intro-stage { padding: 15px; }
            .robot-container { bottom: 10%; left: 5%; }
            .space-robot { width: 160px; }
            .speech-bubble { font-size: 16px; max-width: 180px; padding: 12px; }
            #game-container { flex: none; height: 70vh; padding: 10px; }
            #title-bubble { font-size: 16px; padding: 8px 20px; max-width: 95%; }
            .game-layer { max-height: 52vh; }
            #palette-sidebar { width: 100%; height: 30vh; border-left: none; border-top: 3px solid rgba(255, 255, 255, 0.15); padding: 12px; flex-direction: row; }
            .sidebar-label { display: none; }
            .swatch-container { flex-direction: row; overflow-x: auto; width: 65%; height: 65px; margin-bottom: 0; }
            .color-swatch { width: 48px; height: 48px; }
            .btn-group { width: 32%; gap: 6px; }
            .btn { padding: 10px 5px; font-size: 13px; border-radius: 10px; }
            .trace-container { width: 90px; height: 130px; }
            .guide-letter { font-size: 55px; }
        }
    </style>
</head>
<body>

    <div id="intro-stage">
        <div class="robot-container">
            <img src="pictures/robot.png" alt="Robot" class="space-robot" onerror="this.src='https://placehold.co/280x350/4a69bd/ffffff?text=Робот'">
            <div class="speech-bubble">Добро пожаловать к букве Р!</div>
        </div>
    </div>

    <div id="dim-overlay"></div>
    
    <div id="stage2-popup" class="popup">
        <h1>Отличная работа!</h1>
        <p style="font-size: 18px; font-weight: 600;">Теперь давай научимся правильно писать букву "Р".</p>
        <button class="btn" style="background:#6e8efb; max-width:200px; margin:0 auto;" onclick="startStage2()">Начать</button>
    </div>

    <div id="congrats-popup" class="popup">
        <h1 style="color: #2ed573;">Молодец!</h1>
        <p style="font-size: 18px; font-weight: 600;">Ты успешно прошёл все задания с буквой Р!</p>
        <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
            <button class="btn" style="background:#ff4757;" onclick="location.reload()">Заново</button>
            <button class="btn" style="background:#2ed573;" onclick="window.location.href='P3.html'">Далее</button>
        </div>
    </div>

    <div id="game-container">
        <div id="title-bubble">Посмотри на букву Р! Заштрихуй её цветными карандашами!</div>
        
        <div id="layer-coloring" class="game-layer active">
            <canvas id="coloringCanvas"></canvas>
        </div>

        <div id="layer-tracing" class="game-layer">
            <div id="tracing-grid">
                <div class="trace-container"><div class="guide-letter">Р</div><canvas class="trace-canvas"></canvas></div>
                <div class="trace-container"><div class="guide-letter">Р</div><canvas class="trace-canvas"></canvas></div>
                <div class="trace-container"><div class="guide-letter">Р</div><canvas class="trace-canvas"></canvas></div>
                <div class="trace-container"><div class="guide-letter">Р</div><canvas class="trace-canvas"></canvas></div>
                <div class="trace-container"><div class="guide-letter">Р</div><canvas class="trace-canvas"></canvas></div>
            </div>
        </div>
    </div>

    <div id="palette-sidebar">
        <div class="sidebar-label" id="sidebar-context-title">Палитра</div>
        
        <div class="swatch-container" id="color-swatches-box">
            <div class="color-swatch active" style="background-color: #ff4757;" data-color="#ff4757"></div>
            <div class="color-swatch" style="background-color: #2ed573;" data-color="#2ed573"></div>
            <div class="color-swatch" style="background-color: #1e90ff;" data-color="#1e90ff"></div>
            <div class="color-swatch" style="background-color: #ffa502;" data-color="#ffa502"></div>
            <div class="color-swatch" style="background-color: #9b59b6;" data-color="#9b59b6"></div>
            <div class="color-swatch" style="background-color: #00d2d3;" data-color="#00d2d3"></div>
            <div class="color-swatch" style="background-color: #ff6b81;" data-color="#ff6b81"></div>
            <div class="color-swatch" style="background-color: #eccc68;" data-color="#eccc68"></div>
            <div class="color-swatch" style="background-color: #f1f2f6;" data-color="#f1f2f6"></div>
            <div class="color-swatch" style="background-color: #57606f;" data-color="#57606f"></div>
            <div class="color-swatch" style="background-color: #d2873d;" data-color="#d2873d"></div>
        </div>
        
        <div class="btn-group">
            <button id="reset-btn" class="btn">Сбросить</button>
            <button id="next-btn" class="btn">Далее</button>
        </div>
    </div>

    <script>
        /* State Engines Config */
        let currentStage = 1; 
        const canvas = document.getElementById('coloringCanvas');
        const ctx = canvas.getContext('2d');
        const swatches = document.querySelectorAll('.color-swatch');
        const resetBtn = document.getElementById('reset-btn');
        const nextBtn = document.getElementById('next-btn');
        const titleBubble = document.getElementById('title-bubble');

        let selectedColor = { r: 255, g: 71, b: 87 };
        let baseCanvasData = null;

        // Intro Greeting Timer Fade Out
        setTimeout(() => {
            const intro = document.getElementById('intro-stage');
            if(intro) {
                intro.style.opacity = '0';
                setTimeout(() => intro.remove(), 500);
            }
        }, 3500);

        /* ========================================================
           STAGE 1: GRAPHICS RENDERING & FLOODFILL LOGIC
           ======================================================== */
        const gameAsset = new Image();
        gameAsset.src = 'pictures/p_outline.png'; 

        gameAsset.onload = () => {
            canvas.width = gameAsset.naturalWidth || 700;
            canvas.height = gameAsset.naturalHeight || 600;
            resetColoringCanvas();
        };
        gameAsset.onerror = () => {
            canvas.width = 700;
            canvas.height = 600;
            drawGraffiti3DLetterP();
        };

        function cacheBaseCanvas() {
            baseCanvasData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        function drawGraffiti3DLetterP() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f7f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            const strokeColor = '#1a252c';
            const fillColor = '#e2e5e9';
            ctx.lineWidth = 8;
            ctx.strokeStyle = strokeColor;
            ctx.fillStyle = fillColor;

            // Geometry fully centered on 700x600 canvas
            // Width of stem = 50, Loop radius = 87.5
            // Total width ~ 320, centered perfectly around X: 350
            const cX = 350; 
            const dx = -18; 
            const dy = 18;

            // --- 1. Extrusion Shadow (Back) ---
            // Stem back
            ctx.beginPath();
            ctx.rect((cX - 90) + dx, 125 + dy, 50, 350);
            ctx.fill();
            ctx.stroke();

            // Loop back
            ctx.beginPath();
            ctx.arc((cX - 40) + dx, 212.5 + dy, 87.5, 1.5 * Math.PI, 0.5 * Math.PI);
            ctx.lineTo((cX - 40) + dx, 300 + dy);
            ctx.lineTo((cX - 40) + dx, 125 + dy);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // --- 2. Front Face ---
            ctx.fillStyle = '#ffffff';

            // Stem front
            ctx.beginPath();
            ctx.rect(cX - 90, 125, 50, 350);
            ctx.fill();
            ctx.stroke();

            // Loop front
            ctx.beginPath();
            ctx.arc(cX - 40, 212.5, 87.5, 1.5 * Math.PI, 0.5 * Math.PI);
            ctx.lineTo(cX - 40, 300);
            ctx.lineTo(cX - 40, 125);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // --- 3. Cutout Inner Hole of the Letter ---
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cX - 40, 212.5, 40, 1.5 * Math.PI, 0.5 * Math.PI);
            ctx.lineTo(cX - 40, 252.5);
            ctx.lineTo(cX - 40, 172.5);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            cacheBaseCanvas();
        }

        function resetColoringCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameAsset.complete && gameAsset.naturalWidth > 0) {
                ctx.drawImage(gameAsset, 0, 0, canvas.width, canvas.height);
                cacheBaseCanvas();
            } else {
                drawGraffiti3DLetterP();
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        swatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelector('.color-swatch.active').classList.remove('active');
                swatch.classList.add('active');
                selectedColor = hexToRgb(swatch.getAttribute('data-color'));
            });
        });

        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = imageData.width; const height = imageData.height;

            const startPos = (startY * width + startX) * 4;
            const startR = data[startPos]; const startG = data[startPos + 1]; const startB = data[startPos + 2]; const startA = data[startPos + 3];

            if (startR === fillColor.r && startG === fillColor.g && startB === fillColor.b) return;
            if (startR < 65 && startG < 65 && startB < 65 && startA > 200) return; 

            const queue = [[startX, startY]];

            while (queue.length > 0) {
                const [x, y] = queue.shift();
                let currentY = y;
                while (currentY >= 0 && matchStartColor(currentY * width + x)) currentY--;
                currentY++;

                let reachLeft = false; let reachRight = false;
                while (currentY < height && matchStartColor(currentY * width + x)) {
                    const pos = (currentY * width + x) * 4;
                    data[pos] = fillColor.r; data[pos + 1] = fillColor.g; data[pos + 2] = fillColor.b; data[pos + 3] = 255;

                    if (x > 0) {
                        if (matchStartColor(currentY * width + (x - 1))) {
                            if (!reachLeft) { queue.push([x - 1, currentY]); reachLeft = true; }
                        } else if (reachLeft) { reachLeft = false; }
                    }
                    if (x < width - 1) {
                        if (matchStartColor(currentY * width + (x + 1))) {
                            if (!reachRight) { queue.push([x + 1, currentY]); reachRight = true; }
                        } else if (reachRight) { reachRight = false; }
                    }
                    currentY++;
                }
            }
            ctx.putImageData(imageData, 0, 0);

            function matchStartColor(pixelIndex) {
                const p = pixelIndex * 4;
                return Math.abs(data[p] - startR) < 25 && Math.abs(data[p + 1] - startG) < 25 && Math.abs(data[p + 2] - startB) < 25 && data[p + 3] > 100;
            }
        }

        function handleColorTap(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.floor((clientY - rect.top) * (canvas.height / rect.height));

            if(x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                floodFill(x, y, selectedColor);
                nextBtn.style.display = 'block';
            }
        }

        canvas.addEventListener('click', (e) => handleColorTap(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleColorTap(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });


        /* ========================================================
           STAGE ROUTER CONTROLLER
           ======================================================== */
        nextBtn.addEventListener('click', () => {
            if (currentStage === 1) {
                document.getElementById('dim-overlay').style.display = 'block';
                document.getElementById('stage2-popup').style.display = 'block';
            } else if (currentStage === 2) {
                evaluateManualTracing();
            }
        });

        function startStage2() {
            currentStage = 2;
            document.getElementById('stage2-popup').style.display = 'none';
            document.getElementById('dim-overlay').style.display = 'none';
            
            // Switch view layers
            document.getElementById('layer-coloring').classList.remove('active');
            document.getElementById('layer-tracing').classList.add('active');
            
            // Update Text Context
            titleBubble.textContent = 'Правила игры: Обведи букву "Р" на всех карточках, а затем нажми "Проверить"!';
            titleBubble.style.borderColor = "#6e8efb";

            // Hide Side Palette Panel elements
            document.getElementById('sidebar-context-title').style.display = 'none';
            document.getElementById('color-swatches-box').style.display = 'none';
            
            // Transform Next Button into a static "Check" submission controller
            nextBtn.textContent = 'Проверить';
            nextBtn.style.background = '#6e8efb';
            nextBtn.style.display = 'none'; 

            initializeTracingEngine();
        }


        /* ========================================================
           STAGE 2: MANUAL-SUBMIT WRITING TRACING ENGINE
           ======================================================== */
        let trackingCanvasesState = [];

        function initializeTracingEngine() {
            const traceCanvases = document.querySelectorAll('.trace-canvas');
            trackingCanvasesState = []; 
            
            traceCanvases.forEach((tCanvas, index) => {
                const container = tCanvas.parentElement;
                tCanvas.width = container.clientWidth || 140;
                tCanvas.height = container.clientHeight || 190;
                
                const tCtx = tCanvas.getContext('2d');
                let isDrawing = false;
                
                trackingCanvasesState.push({ drawn: false });
                
                tCtx.strokeStyle = '#6e8efb';
                tCtx.lineWidth = 6; 
                tCtx.lineCap = 'round';
                tCtx.lineJoin = 'round';

                const getTracePos = (e) => {
                    const rect = tCanvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: clientX - rect.left, y: clientY - rect.top };
                };

                const startDraw = (e) => { 
                    isDrawing = true; 
                    tCtx.beginPath(); 
                    tCtx.moveTo(getTracePos(e).x, getTracePos(e).y); 
                    nextBtn.style.display = 'block';
                };
                
                const drawLine = (e) => { 
                    if (!isDrawing) return;
                    const p = getTracePos(e); 
                    tCtx.lineTo(p.x, p.y); 
                    tCtx.stroke(); 
                    tCtx.beginPath(); 
                    tCtx.moveTo(p.x, p.y); 
                };
                
                // Track finger/cursor release globally outside canvas box limits to avoid locking states
                const stopDraw = () => { 
                    if (isDrawing) {
                        trackingCanvasesState[index].drawn = true;
                    }
                    isDrawing = false; 
                };

                tCanvas.addEventListener('mousedown', startDraw);
                tCanvas.addEventListener('mousemove', drawLine);
                
                window.addEventListener('mouseup', stopDraw);
                
                tCanvas.addEventListener('touchstart', (e) => { 
                    e.preventDefault(); 
                    startDraw(e); 
                }, { passive: false });
                
                tCanvas.addEventListener('touchmove', (e) => { 
                    e.preventDefault(); 
                    drawLine(e); 
                }, { passive: false });
                
                window.addEventListener('touchend', stopDraw);
            });
        }

        function evaluateManualTracing() {
            const totalDrawnCards = trackingCanvasesState.filter(item => item.drawn === true).length;
            
            if (totalDrawnCards === trackingCanvasesState.length) {
                document.getElementById('dim-overlay').style.display = 'block';
                confetti({ particleCount: 180, spread: 80, origin: { y: 0.55 } });
                document.getElementById('congrats-popup').style.display = 'block';
            } else {
                alert("Обведи все буквы на экране перед проверкой!");
            }
        }

        /* Global Reset Engine Trigger */
        resetBtn.addEventListener('click', () => {
            if(currentStage === 1) {
                resetColoringCanvas();
                nextBtn.style.display = 'none';
            } else {
                nextBtn.style.display = 'none';
                const traceCanvases = document.querySelectorAll('.trace-canvas');
                traceCanvases.forEach(tc => {
                    const tcCtx = tc.getContext('2d');
                    tcCtx.clearRect(0, 0, tc.width, tc.height);
                });
                initializeTracingEngine();
            }
        });
    </script>
</body>
</html>
