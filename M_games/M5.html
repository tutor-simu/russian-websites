<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Космическое Чтение | Слоги</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

        :root {
            --bg-dark: #0b0b1e;
            --card-bg: rgba(255, 255, 255, 0.95);
            --active-border: #ffa502;
            --char-color: #1e272e;
        }

        body { 
            margin: 0;
            padding: 20px;
            min-height: 100vh; 
            background: radial-gradient(circle at center, #1b1b3a 0%, #080811 100%);
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            color: white;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Welcome Screen */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 11, 30, 0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            padding: 20px;
            box-sizing: border-box;
        }

        .welcome-bubble {
            background: white;
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 4px solid #4a69bd;
            color: #1e272e;
        }

        .welcome-bubble h1 { font-size: 36px; margin-top: 0; color: #4a69bd; font-weight: 900; }
        .welcome-bubble p { font-size: 20px; line-height: 1.5; margin-bottom: 25px; font-weight: 700; }

        #start-btn {
            padding: 15px 40px; font-size: 22px; font-weight: 800;
            background-color: #2ed573; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 6px 20px rgba(46, 213, 115, 0.4); 
            transition: transform 0.2s;
        }
        #start-btn:hover { transform: scale(1.05); }

        /* Game Board */
        .game-card { 
            background: rgba(17, 24, 39, 0.6); 
            padding: 30px; 
            border-radius: 35px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 650px; 
            text-align: center; 
            box-sizing: border-box;
            border: 4px solid rgba(255, 255, 255, 0.1);
            display: none;
            flex-direction: column;
            margin-top: 20px;
            backdrop-filter: blur(10px);
            z-index: 5;
        }

        .screen-title {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 25px;
            color: #82ccdd;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cards-list-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
        }

        .card-row-item {
            background: var(--card-bg);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid transparent;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            padding: 20px 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            min-height: 140px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Animation Track Layout */
        .animation-track {
            position: relative;
            width: 90%;
            max-width: 500px;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 90px;
            font-weight: 900;
            color: var(--char-color);
            margin: 0 auto;
        }

        .static-letter {
            z-index: 2;
            position: absolute;
            right: 0;
        }

        .moving-letter {
            position: absolute;
            left: 0;
            transition: transform 2.0s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 3;
            will-change: transform;
        }

        /* End-Game Victory Popup */
        .modal { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(11, 11, 30, 0.9); 
            backdrop-filter: blur(12px);
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 3000; 
        }

        .modal-content { 
            background: white;
            color: #1e272e;
            padding: 40px; 
            border-radius: 35px; 
            text-align: center; 
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 4px solid #2ed573;
        }

        .modal-content h1 { color: #2ed573; font-size: 32px; font-weight: 900; margin-bottom: 25px; }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn { 
            flex: 1;
            padding: 16px 20px; 
            border-radius: 15px; 
            border: none; 
            font-size: 18px;
            font-weight: 800; 
            cursor: pointer; 
            text-decoration: none; 
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-restart { background: #ffa502; color: white; }
        .btn-next { background: #2ed573; color: white; }
        .btn:hover { transform: translateY(-3px); }

        .screen-container {
            display: none;
            width: 100%;
        }

        .screen-container.active-screen {
            display: flex;
            flex-direction: column;
        }

        #bear-anchor {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
            width: 12vw;
            min-width: 80px;
            max-width: 180px; 
        }

        .space-bear {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
            animation: floatingBear 3.5s ease-in-out infinite;
        }

        @keyframes floatingBear {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        @media (max-width: 768px) {
            .animation-track { font-size: 70px; height: 80px; max-width: 320px; }
            .game-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="finalModal" class="modal">
        <div class="modal-content">
            <h1>Миссия выполнена!</h1>
            <p style="font-size: 18px; font-weight: 700; margin-bottom: 25px;">Ты прочитал все космические слоги!</p>
            <div class="btn-group">
                <button class="btn btn-restart" onclick="location.reload()">Заново</button>
                <button class="btn btn-next" onclick="location.href='M6.html'">Далее</button>
            </div>
        </div>
    </div>

    <div id="welcome-screen">
        <div class="welcome-bubble">
            <h1>Космическое чтение</h1>
            <p>Смотри, как левая буква летит к правой и они соединяются в слог!</p>
            <button id="start-btn" onclick="startGame()">Начать миссию</button>
        </div>
    </div>

    <div class="game-card" id="game-layout">
        <div id="screen1" class="screen-container active-screen">
            <div class="screen-title">Сектор 1: Прямые слоги</div>
            <div class="cards-list-stack" id="grid1"></div>
        </div>

        <div id="screen2" class="screen-container">
            <div class="screen-title">Сектор 2: Обратные слоги</div>
            <div class="cards-list-stack" id="grid2"></div>
        </div>
    </div>

    <div id="bear-anchor">
        <img class="space-bear" src="../pictures/game4/bear.png" alt="Space Bear" onerror="this.src='https://placehold.co/180x210/4a69bd/ffffff?text=🐻'">
    </div>

    <script>
        const screensData = [
            ['МА', 'МО', 'МУ'], 
            ['АМ', 'ОМ', 'УМ']   
        ];

        let currentScreen = 0;

        function startGame() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('game-layout').style.display = 'flex';
            initScreen(currentScreen);
        }

        async function initScreen(screenIndex) {
            const screenId = `grid${screenIndex + 1}`;
            const targetContainer = document.getElementById(screenId);
            targetContainer.innerHTML = '';

            const rowsData = [];

            // Создаем элементы для всех трех слогов, но пока не запускаем анимацию
            screensData[screenIndex].forEach(syllable => {
                const cardRow = document.createElement('div');
                cardRow.className = 'card-row-item';

                const track = document.createElement('div');
                track.className = 'animation-track';

                const firstChar = syllable[0];
                const secondChar = syllable[1];

                const staticLetter = document.createElement('div');
                staticLetter.className = 'static-letter';
                staticLetter.innerText = secondChar;

                const movingLetter = document.createElement('div');
                movingLetter.className = 'moving-letter';
                movingLetter.innerText = firstChar;
                movingLetter.style.left = '0px';
                
                track.appendChild(movingLetter);
                track.appendChild(staticLetter);

                cardRow.appendChild(track);
                targetContainer.appendChild(cardRow);

                rowsData.push({ cardRow, movingLetter, staticLetter });
            });

            // Запуск анимации строго по очереди (1 -> 2 -> 3)
            for (let i = 0; i < rowsData.length; i++) {
                await triggerAnimation(rowsData[i].cardRow, rowsData[i].movingLetter, rowsData[i].staticLetter);
            }

            // Переключение экранов или завершение
            if (screenIndex < screensData.length - 1) {
                document.getElementById(`screen${currentScreen + 1}`).classList.remove('active-screen');
                currentScreen++;
                document.getElementById(`screen${currentScreen + 1}`).classList.add('active-screen');
                initScreen(currentScreen);
            } else {
                document.getElementById('finalModal').style.display = 'flex';
            }
        }

        function triggerAnimation(cardRow, movingEl, staticEl) {
            return new Promise(async (resolve) => {
                await new Promise(r => setTimeout(r, 400));
                cardRow.style.borderColor = 'var(--active-border)';
                
                // Вычисляем точное расстояние между левой и правой буквой
                const staticRect = staticEl.getBoundingClientRect();
                const movingRect = movingEl.getBoundingClientRect();
                const distance = staticRect.left - movingRect.left - movingRect.width;

                movingEl.style.transform = `translateX(${distance}px)`;

                await new Promise(r => setTimeout(r, 2000)); // Время удержания в соединенном виде
                cardRow.style.borderColor = 'transparent';
                movingEl.style.transform = 'translateX(0px)'; // Возврат на исходную
                await new Promise(r => setTimeout(r, 800));
                
                resolve();
            });
        }
    </script>
</body>
</html>
