<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Найди пропавшую карточку | Bilingvi Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('../pictures/background/space_backround.jpeg') center center/cover no-repeat;
            background-color: #0b0b1e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            color: white;
            box-sizing: border-box;
            padding-top: 20px;
        }

        /* Top Bar Info */
        #game-status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            z-index: 10;
        }

        .status-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 800;
            color: #1e272e;
            border: 3px solid #ffa502;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        /* Main Arena (Adjusted for responsiveness and larger size) */
        #game-arena {
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            height: 65vh;
            box-sizing: border-box;
            padding: 20px;
        }

        /* Green Ready Button */
        #ready-btn {
            background-color: #2ed573;
            color: white;
            border-color: #26af5f;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(46, 213, 115, 0.4);
        }

        #ready-btn:hover {
            transform: scale(1.05);
            background-color: #26af5f;
        }

        #ready-btn:disabled {
            background-color: #7f8c8d;
            border-color: #7f8c8d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 2x2 Grid - Adjusted base size to 220px for larger desktops */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 220px);
            grid-template-rows: repeat(2, 220px);
            gap: 30px;
            perspective: 1000px;
        }

        .card-wrapper {
            width: 220px;
            height: 220px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 35px;
            cursor: default;
        }

        .card-wrapper.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            box-sizing: border-box;
            border: 8px solid #4a69bd;
            background: white;
            overflow: hidden;
        }

        .card-front img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .card-front span {
            font-size: 100px;
        }

        .card-back {
            background: #20bf6b;
            color: white;
            transform: rotateY(180deg);
            font-size: 45px;
            font-weight: 800;
            border-color: #26af5f;
        }

        .card-wrapper.clickable {
            cursor: pointer;
        }

        .card-wrapper.clickable .card-back {
            border: 8px dashed #ffa502;
            animation: pulseBorder 2s infinite;
        }

        @keyframes pulseBorder {
            0%, 100% { border-color: #ffa502; }
            50% { border-color: #ff4757; }
        }

        /* Bear Dialog Stage */
        #bear-stage {
            position: absolute;
            bottom: 3%;
            left: 3%;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
            pointer-events: none;
        }

        .space-bear {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: floatBear 3s ease-in-out infinite;
        }

        .speech-bubble {
            background: white;
            border-radius: 25px;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: 800;
            color: #1e272e;
            position: relative;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid #4a69bd;
            text-align: center;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 15px 15px 15px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }

        /* End Game Screen Overlay */
        #victory-popup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 11, 30, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .popup-content-box {
            display: flex;
            align-items: center;
            gap: 30px;
            max-width: 800px;
            padding: 20px;
        }

        .popup-bubble {
            background: white;
            border-radius: 30px;
            padding: 30px;
            border: 4px solid #2ed573;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
        }

        .popup-bubble::after {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 20px 20px 20px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }

        .popup-text {
            font-size: 24px;
            font-weight: 800;
            color: #1e272e;
            text-align: center;
            margin: 0;
        }

        .popup-buttons-container {
            display: flex;
            gap: 15px;
        }

        .popup-btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .popup-btn:hover { transform: translateY(-3px); }
        .btn-again { background: #ffa502; color: white; }
        .btn-next { background: #2ed573; color: white; }

        @keyframes floatBear {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Tablet/Mobile Responsive Adjustments */
        @media (max-width: 900px) {
            #game-arena { flex-direction: column; height: auto; gap: 30px; }
            .cards-grid { grid-template-columns: repeat(2, 160px); grid-template-rows: repeat(2, 160px); gap: 20px; }
            .card-wrapper { width: 160px; height: 160px; border-radius: 25px; }
            .card-face { border-radius: 25px; border-width: 6px; }
            .card-front span { font-size: 60px; }
            .card-back { font-size: 30px; }
            .card-wrapper.clickable .card-back { border-width: 6px; }
        }

        @media (max-width: 768px) {
            #bear-stage { flex-direction: column; bottom: 2%; left: 2%; align-items: flex-start; gap: 5px;}
            .space-bear { width: 120px; }
            .speech-bubble { font-size: 15px; max-width: 200px; padding: 10px; }
            .speech-bubble::after {
                left: 50%; top: -12px; transform: translateX(-50%);
                border-width: 0 12px 12px 12px;
                border-color: transparent transparent white transparent;
            }
            .status-panel { font-size: 16px; padding: 6px 15px; }
            .popup-content-box { flex-direction: column; }
            .popup-bubble::after { display: none; }
        }

        @media (max-width: 400px) {
            .cards-grid { grid-template-columns: repeat(2, 120px); grid-template-rows: repeat(2, 120px); gap: 15px; }
            .card-wrapper { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <div id="game-status-bar">
        <div id="round-box" class="status-panel">Раунд 1/2</div>
    </div>

    <div id="game-arena">
        <button id="ready-btn" class="status-panel" onclick="startRoundLogic()">Готовы?</button>
        <div class="cards-grid" id="cardsGrid">
            </div>
    </div>

    <div id="bear-stage">
        <img src="../pictures/game4/bear.png" alt="Bear" class="space-bear" onerror="this.src='https://placehold.co/220x260/4a69bd/ffffff?text=🐻'">
        <div id="speech-text" class="speech-bubble">Привет! Нажми зеленую кнопку, когда будешь готов!</div>
    </div>

    <div id="victory-popup">
        <div class="popup-content-box">
            <img src="../pictures/game4/bear.png" alt="Bear" class="space-bear" onerror="this.src='https://placehold.co/220x260/4a69bd/ffffff?text=🐻'">
            <div class="popup-bubble">
                <p class="popup-text">Отличная работа! Ты справился со всеми космическими загадками!</p>
                <div class="popup-buttons-container">
                    <button class="popup-btn btn-again" onclick="location.reload();">Заново</button>
                    <button class="popup-btn btn-next" onclick="location.href='M4.html'">Далее</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const roundBox = document.getElementById('round-box');
    const speechText = document.getElementById('speech-text');
    const cardsGrid = document.getElementById('cardsGrid');
    const readyBtn = document.getElementById('ready-btn');
    const victoryPopup = document.getElementById('victory-popup');

    const gameRounds = [
        {
            roundNum: 1,
            cards: [
                { id: 1, name: 'Мука', img: 'pictures/мука.png', fallback: '🌾' },
                { id: 2, name: 'Мышка', img: 'pictures/мышка.png', fallback: '🐭' },
                { id: 3, name: 'Луна', img: 'pictures/луна.png', fallback: '🌙' },
                { id: 4, name: 'Муравей', img: 'pictures/муравей.png', fallback: '🐜' }
            ]
        },
        {
            roundNum: 2,
            cards: [
                { id: 5, name: 'Мамонт', img: 'pictures/мамонт.png', fallback: '🦣' },
                { id: 6, name: 'Майка', img: 'pictures/майка.png', fallback: '🎽' },
                { id: 7, name: 'Медведь', img: '../pictures/game4/bear.png', fallback: '🐻' },
                { id: 8, name: 'Морж', img: 'pictures/морж.png', fallback: '🦭' }
            ]
        }
    ];

    let currentRoundIndex = 0;
    let hiddenCardIndex = null;

    function initRound(index) {
        currentRoundIndex = index;
        roundBox.textContent = `Раунд ${index + 1}/2`;
        speechText.textContent = "Запомни эти 4 картинки! Нажми Готовы?, когда перевернешь их.";
        
        readyBtn.disabled = false;
        renderCards(true); // Initially visible/face-up
    }

    function renderCards(faceUp = true) {
        cardsGrid.innerHTML = '';
        const currentCards = gameRounds[currentRoundIndex].cards;

        currentCards.forEach((card, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = `card-wrapper ${faceUp ? '' : 'flipped'}`;
            wrapper.dataset.index = index;

            const front = document.createElement('div');
            front.className = 'card-face card-front';
            
            // Image handling matching fallback logic
            const img = document.createElement('img');
            img.src = card.img;
            img.alt = card.name;
            img.onerror = function() {
                this.replaceWith(createFallbackText(card.fallback));
            };
            front.appendChild(img);

            const back = document.createElement('div');
            back.className = 'card-face card-back';
            back.innerText = '?';

            wrapper.appendChild(front);
            wrapper.appendChild(back);
            
            cardsGrid.appendChild(wrapper);
        });
    }

    function createFallbackText(fallback) {
        const span = document.createElement('span');
        span.innerText = fallback;
        return span;
    }

    async function startRoundLogic() {
        readyBtn.disabled = true;
        speechText.textContent = "Запоминаем...";

        // 1. Turn all 4 cards to their backs
        const cardWrappers = document.querySelectorAll('.card-wrapper');
        cardWrappers.forEach(card => card.classList.add('flipped'));

        await new Promise(r => setTimeout(r, 1200));

        // 2. Turn 3 cards back to the front side (leaving 1 back-sided)
        hiddenCardIndex = Math.floor(Math.random() * 4);
        
        cardWrappers.forEach((card, idx) => {
            if (idx !== hiddenCardIndex) {
                card.classList.remove('flipped');
            } else {
                card.classList.add('clickable');
                card.addEventListener('click', revealHiddenCard, { once: true });
            }
        });

        speechText.textContent = "Какая карточка осталась закрытой? Нажми на нее!";
    }

    async function revealHiddenCard(e) {
        const clickedCard = e.currentTarget;
        if (!clickedCard.classList.contains('clickable')) return;

        clickedCard.classList.remove('clickable');
        clickedCard.classList.remove('flipped'); // Reveal the truth!

        speechText.textContent = "Ура, правильный ответ!";

        await new Promise(r => setTimeout(r, 1500));

        // Advance round or show victory
        if (currentRoundIndex + 1 < gameRounds.length) {
            initRound(currentRoundIndex + 1);
        } else {
            cardsGrid.innerHTML = '';
            document.getElementById('game-arena').style.display = 'none';
            victoryPopup.style.display = 'flex';
        }
    }

    // Start First Round Immediately
    initRound(0);
</script>
</body>
</html>
