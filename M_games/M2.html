<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космическая Сортировка - Буква М | Bilingvi Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('../pictures/background/space_backround.jpeg') center center/cover no-repeat;
            background-color: #0b0b1e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ========================================================
           CINEMATIC INTRO ANIMATION SYSTEM 
           ======================================================== */
        #intro-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 50px;
            box-sizing: border-box;
        }

        .bear-container {
            display: flex;
            align-items: center;
            gap: 20px;
            position: absolute;
            bottom: 5%;
            left: 5%;
            animation: float 4s ease-in-out infinite;
        }

        .space-bear {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .speech-bubble {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            font-size: 22px;
            font-weight: 800;
            color: #1e272e;
            position: relative;
            max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid #4a69bd;
            opacity: 0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 15px 15px 15px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
            display: block;
            width: 0;
        }

        /* ========================================================
           VICTORY POP-UP MODAL SYSTEM (Bear Speech Bubble Popup)
           ======================================================== */
        #victory-popup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 11, 30, 0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none; /* Controlled via JS */
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .popup-content-box {
            display: flex;
            align-items: center;
            gap: 30px;
            max-width: 800px;
            padding: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .popup-bubble {
            background: white;
            border-radius: 30px;
            padding: 30px;
            border: 4px solid #2ed573;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
        }

        .popup-bubble::after {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 20px 20px 20px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
            display: block;
            width: 0;
        }

        .popup-text {
            font-size: 24px;
            font-weight: 800;
            color: #1e272e;
            text-align: center;
            margin: 0;
        }

        .popup-buttons-container {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .popup-btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .popup-btn:hover {
            transform: translateY(-3px);
        }

        .btn-again {
            background: #ffa502;
            color: white;
        }
        .btn-again:hover { background: #eccc68; }

        .btn-next {
            background: #2ed573;
            color: white;
        }
        .btn-next:hover { background: #26af5f; }

        /* ========================================================
           GAME LAYOUT MAP
           ======================================================== */
        #main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInWorkspace 1s ease forwards 2s;
        }

        #title-instructions {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 30px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 800;
            color: #1e272e;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid #2ed573;
            text-align: center;
            z-index: 5;
            max-width: 80%;
        }

        #fridge-container {
            width: 100%;
            max-width: 450px;
            height: 70vh;
            background: url('pictures/empty_fridge.png') center center/contain no-repeat;
            position: relative;
            transition: transform 0.2s;
            z-index: 2;
        }

        #fridge-container.drag-hover {
            transform: scale(1.03);
            filter: drop-shadow(0 0 20px rgba(46, 213, 115, 0.6));
        }

        .fridge-slot {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 3px dashed rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            box-sizing: border-box;
            z-index: 3;
            pointer-events: none;
        }

        /* Увеличенные и распределенные 5 слотов */
        #slot-1 { top: 15%; left: 15%; }
        #slot-2 { top: 15%; left: 55%; }
        #slot-3 { top: 38%; left: 15%; }
        #slot-4 { top: 38%; left: 55%; }
        #slot-5 { top: 60%; left: 35%; }

        /* ========================================================
           RIGHT SIDEBAR ITEM CONTAINER
           ======================================================== */
        #items-sidebar {
            width: 340px;
            background: rgba(11, 11, 30, 0.65);
            backdrop-filter: blur(20px);
            border-left: 3px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            box-sizing: border-box;
            z-index: 10;
            height: 100vh;
            opacity: 0;
            animation: fadeInWorkspace 1s ease forwards 3s;
        }

        .sidebar-header {
            color: #ffffff;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .scrollable-shelf {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            justify-items: center;
            align-content: start;
            padding: 10px 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }

        .food-item {
            width: 140px;
            height: 140px;
            background: #ffffff;
            border: 3px solid #718093;
            border-radius: 18px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: none;
            z-index: 20;
        }

        .food-item:active { cursor: grabbing; }
        .food-item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        .food-item.placed-inside {
            position: absolute !important;
            width: 120px;
            height: 120px;
            border-color: #2ed573;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: default;
            z-index: 30 !important;
        }

        /* TIMELINE ANIMATIONS ENGINE */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeInWorkspace {
            to { opacity: 1; pointer-events: auto; }
        }

        /* Mobile Adaptations */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; overflow: auto; height: auto; }
            #main-workspace { height: 70vh; padding: 10px; }
            #title-instructions { font-size: 15px; padding: 8px 15px; margin-bottom: 5px; }
            #fridge-container { height: 50vh; max-width: 300px; }
            
            .fridge-slot { width: 80px; height: 80px; }
            #slot-1 { left: 15%; top: 10%; }
            #slot-2 { left: 55%; top: 10%; }
            #slot-3 { left: 15%; top: 28%; }
            #slot-4 { left: 55%; top: 28%; }
            #slot-5 { left: 35%; top: 46%; }

            #intro-stage { padding: 15px; }
            .space-bear { width: 150px; }
            .speech-bubble { font-size: 16px; max-width: 180px; padding: 12px; }

            .popup-content-box { flex-direction: column; gap: 15px; padding: 10px; }
            .popup-bubble { padding: 20px; max-width: 280px; }
            .popup-bubble::after {
                left: 50%; top: -15px; transform: translateX(-50%);
                border-width: 0 15px 15px 14px;
                border-color: transparent transparent white transparent;
            }
            .popup-text { font-size: 18px; }

            #items-sidebar { width: 100%; height: 40vh; border-left: none; border-top: 3px solid rgba(255, 255, 255, 0.15); padding: 10px; }
            .sidebar-header { margin-bottom: 10px; font-size: 14px; }
            .scrollable-shelf { display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; height: 160px; justify-content: flex-start; align-items: center; }
            .food-item { width: 110px; height: 110px; flex-shrink: 0; }
            .food-item.placed-inside { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <div id="intro-stage">
        <div class="bear-container">
            <img src="../pictures/game4/bear.png" alt="Bear" class="space-bear" onerror="this.src='https://placehold.co/280x350/4a69bd/ffffff?text=Медведь'">
            <div class="speech-bubble">Я совсем не голоден, помоги мне убрать все продукты в холодильник!</div>
        </div>
    </div>

    <div id="victory-popup">
        <div class="popup-content-box">
            <img src="../pictures/game4/bear.png" alt="Bear" class="space-bear" onerror="this.src='https://placehold.co/280x350/4a69bd/ffffff?text=Медведь'">
            <div class="popup-bubble">
                <p class="popup-text">Ура! Все продукты разложены правильно! Что будем делать дальше?</p>
                <div class="popup-buttons-container">
                    <button class="popup-btn btn-again" onclick="location.reload();">Заново</button>
                    <button class="popup-btn btn-next" onclick="location.href='M3.html'">Далее</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-workspace">
        <div id="title-instructions">Положи в холодильник только те продукты, названия которых начинаются со звука "М".</div>
        <div id="fridge-container">
            <div class="fridge-slot" id="slot-1" data-occupied="false"></div>
            <div class="fridge-slot" id="slot-2" data-occupied="false"></div>
            <div class="fridge-slot" id="slot-3" data-occupied="false"></div>
            <div class="fridge-slot" id="slot-4" data-occupied="false"></div>
            <div class="fridge-slot" id="slot-5" data-occupied="false"></div>
        </div>
    </div>

    <div id="items-sidebar">
        <div class="sidebar-header">Перетащи продукты</div>
        <div class="scrollable-shelf" id="shelf">
            <div class="food-item" data-match="true" data-name="мука"><img src="pictures/мука.png" alt="Мука"></div>
            <div class="food-item" data-match="true" data-name="молоко"><img src="pictures/молоко.png" alt="Молоко"></div>
            <div class="food-item" data-match="true" data-name="мед"><img src="pictures/мед.png" alt="Мед"></div>
            <div class="food-item" data-match="true" data-name="мороженое"><img src="pictures/мороженое.png" alt="Мороженое"></div>
            <div class="food-item" data-match="true" data-name="малина"><img src="pictures/малина.png" alt="Малина"></div>
            <div class="food-item" data-match="false" data-name="бананы"><img src="pictures/бананы.png" alt="Бананы"></div>
            <div class="food-item" data-match="false" data-name="виноград"><img src="pictures/виноград.png" alt="Виноград"></div>
        </div>
    </div>

<script>
    const shelf = document.getElementById('shelf');
    const fridge = document.getElementById('fridge-container');
    const foodItems = document.querySelectorAll('.food-item');
    const slots = document.querySelectorAll('.fridge-slot');
    const victoryPopup = document.getElementById('victory-popup');

    let correctSnappedCount = 0;

    // Shuffle cards
    const cardsArray = Array.from(foodItems);
    cardsArray.sort(() => Math.random() - 0.5);
    cardsArray.forEach(card => shelf.appendChild(card));

    foodItems.forEach(item => {
        item.addEventListener('pointerdown', onPointerDown);
    });

    // Cleanup intro stage completely to reveal interface
    setTimeout(() => {
        const intro = document.getElementById('intro-stage');
        if(intro) intro.remove();
    }, 6000);

    function onPointerDown(e) {
        if (this.classList.contains('placed-inside')) return;
        
        e.preventDefault();
        const item = this;
        
        const rect = item.getBoundingClientRect();
        const shiftX = e.pageX - (rect.left + window.scrollX);
        const shiftY = e.pageY - (rect.top + window.scrollY);

        item.style.touchAction = 'none';
        item.style.width = rect.width + 'px';
        item.style.height = rect.height + 'px';
        
        item.style.left = (e.pageX - shiftX) + 'px';
        item.style.top = (e.pageY - shiftY) + 'px';
        item.style.position = 'absolute'; 
        item.style.zIndex = '1000';

        document.body.appendChild(item);
        item.setPointerCapture(e.pointerId);

        function onPointerMove(ev) {
            item.style.left = (ev.pageX - shiftX) + 'px';
            item.style.top = (ev.pageY - shiftY) + 'px';
            
            const fridgeRect = fridge.getBoundingClientRect();
            if (ev.clientX >= fridgeRect.left && ev.clientX <= fridgeRect.right &&
                ev.clientY >= fridgeRect.top && ev.clientY <= fridgeRect.bottom) {
                fridge.classList.add('drag-hover');
            } else {
                fridge.classList.remove('drag-hover');
            }
        }

        function onPointerUp(ev) {
            item.removeEventListener('pointermove', onPointerMove);
            item.removeEventListener('pointerup', onPointerUp);
            item.releasePointerCapture(ev.pointerId);
            fridge.classList.remove('drag-hover');

            const isCorrectMatch = item.getAttribute('data-match') === 'true';
            let snapped = false;

            if (isCorrectMatch) {
                slots.forEach(slot => {
                    if (snapped || slot.getAttribute('data-occupied') === 'true') return;

                    const sRect = slot.getBoundingClientRect();
                    const iRect = item.getBoundingClientRect();

                    const dist = Math.hypot(
                        (sRect.left + sRect.width / 2) - (iRect.left + iRect.width / 2),
                        (sRect.top + sRect.height / 2) - (iRect.top + iRect.height / 2)
                    );

                    // Увеличиваем радиус захвата для удобства попадания в увеличенные слоты
                    const activeTolerance = Math.max(sRect.width, 120);

                    if (dist < activeTolerance) {
                        fridge.appendChild(item);
                        item.classList.add('placed-inside');
                        
                        item.style.position = 'absolute';
                        item.style.top = slot.style.top || window.getComputedStyle(slot).top;
                        item.style.left = slot.style.left || window.getComputedStyle(slot).left;
                        
                        item.style.width = sRect.width + 'px';
                        item.style.height = sRect.height + 'px';
                        item.style.zIndex = '30';
                        item.style.pointerEvents = 'none'; 
                        item.style.touchAction = '';

                        slot.setAttribute('data-occupied', 'true');
                        snapped = true;
                        correctSnappedCount++;
                        
                        setTimeout(checkWinCondition, 300);
                    }
                });
            }

            if (!snapped) {
                returnToShelf(item);
            }
        }

        item.addEventListener('pointermove', onPointerMove);
        item.addEventListener('pointerup', onPointerUp);
    }

    function returnToShelf(item) {
        item.style.position = '';
        item.style.zIndex = '';
        item.style.width = '';
        item.style.height = '';
        item.style.left = '';
        item.style.top = '';
        item.style.touchAction = '';
        shelf.appendChild(item);
    }

    function checkWinCondition() {
        // Увеличено условие победы до 5 правильных элементов
        if (correctSnappedCount === 5) {
            victoryPopup.style.display = 'flex';
        }
    }
</script>
</body>
</html>
