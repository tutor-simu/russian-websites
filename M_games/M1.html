<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космическая Раскраска - Буква М | Bilingvi Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('../pictures/background/space_backround.jpeg') center center/cover no-repeat;
            background-color: #0b0b1e; /* Fallback */
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
        }

        /* ========================================================
           CINEMATIC INTRO ANIMATION SYSTEM 
           ======================================================== */
        #intro-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 50px;
            box-sizing: border-box;
        }

        .bear-container {
            display: flex;
            align-items: center;
            gap: 20px;
            position: absolute;
            bottom: 5%;
            left: 5%;
            animation: float 4s ease-in-out infinite;
        }

        .space-bear {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .speech-bubble {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            font-size: 22px;
            font-weight: 800;
            color: #1e272e;
            position: relative;
            max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid #4a69bd;
            opacity: 0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.5s;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 15px 15px 15px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
            display: block;
            width: 0;
        }

        /* Target Planet & Rocket */
        .planet-saturn {
            position: absolute;
            right: 15%;
            top: 15%;
            width: 220px;
            height: auto;
            opacity: 0;
            transform: scale(0.5);
            animation: planetReveal 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 2s;
            filter: drop-shadow(0 0 30px rgba(236, 204, 104, 0.4));
        }

        .rocket-ship {
            position: absolute;
            left: 15%;
            bottom: 25%;
            width: 150px;
            height: auto;
            opacity: 0;
            transform: rotate(45deg);
        }

        /* ========================================================
           MAIN WORKSPACE GAME INTERFACE (Reveals after intro)
           ======================================================== */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            opacity: 0;
            animation: fadeInWorkspace 1s ease forwards 7.5s;
        }

        #title-bubble {
            background: rgba(255, 255, 255, 0.95);
            padding: 14px 40px;
            border-radius: 20px;
            font-size: 26px;
            font-weight: 800;
            color: #1e272e;
            margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid #2ed573;
            text-align: center;
            z-index: 5;
        }

        canvas {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            cursor: crosshair;
            width: 100%;
            height: 100%;
            max-width: 85vh;
            max-height: 75vh;
            object-fit: contain;
            border: 4px solid rgba(255,255,255,0.2);
        }

        #palette-sidebar {
            width: 150px;
            background: rgba(11, 11, 30, 0.65);
            backdrop-filter: blur(20px);
            border-left: 3px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 12px;
            box-sizing: border-box;
            z-index: 10;
            height: 100vh;
            opacity: 0;
            animation: fadeInWorkspace 1s ease forwards 7.5s;
        }

        .swatch-container {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 10px 0;
            margin-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }

        .sidebar-label {
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .color-swatch {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .color-swatch:hover, .color-swatch.active {
            transform: scale(1.15);
        }

        .color-swatch.active {
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 12px;
            margin-top: auto;
        }

        #reset-btn, #next-btn {
            padding: 15px 15px;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #reset-btn { background: #ff4757; }
        #reset-btn:hover { background: #ff6b81; transform: translateY(-2px); }

        #next-btn { background: #2ed573; display: none; }
        #next-btn:hover { background: #26af5f; transform: translateY(-2px); }

        /* ========================================================
           TIMELINE ANIMATIONS ENGINE
           ======================================================== */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes planetReveal {
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeInWorkspace {
            to { opacity: 1; pointer-events: auto; }
        }

        /* ========================================================
           RESPONSIVE MOBILE OVERRIDES
           ======================================================== */
        @media (max-width: 768px) {
            body { 
                flex-direction: column; 
                overflow-y: auto; 
                height: auto;
            }
        
            #intro-stage { padding: 15px; }
            .space-bear { width: 160px; }
            .speech-bubble { font-size: 16px; max-width: 180px; padding: 12px; }
            .planet-saturn { width: 120px; right: 5%; top: 5%; }
            .letter-m-beacon { font-size: 50px; right: 9%; top: 2%; }
            
            #game-container { flex: none; height: 72vh; padding: 10px; }
            #title-bubble { font-size: 18px; padding: 8px 20px; }
            canvas { max-height: 55vh; }
            
            #palette-sidebar { width: 100%; height: 28vh; border-left: none; border-top: 3px solid rgba(255, 255, 255, 0.15); padding: 12px; flex-direction: row; }
            .sidebar-label { display: none; }
            .swatch-container { flex-direction: row; overflow-x: auto; overflow-y: hidden; width: 65%; height: 65px; margin-bottom: 0; }
            .color-swatch { width: 48px; height: 48px; }
            .btn-group { width: 32%; gap: 6px; }
            #reset-btn, #next-btn { padding: 10px 5px; font-size: 13px; border-radius: 10px; }
        }
    </style>
</head>
<body>

    <div id="intro-stage">
        <div class="bear-container">
            <img src="../pictures/game4/bear.png" alt="Bear" class="space-bear" onerror="this.src='https://placehold.co/280x350/4a69bd/ffffff?text=Медведь'">
            <div class="speech-bubble">Ура! Мы приближаемся к новой планете!</div>
        </div>
        <img src="pictures/saturn.png" alt="Saturn" class="planet-saturn" onerror="this.src='https://placehold.co/220x220/ffa502/ffffff?text=Сатурн'">
        <img src="../pictures/rackets/racket.png" alt="Rocket" class="rocket-ship" onerror="this.src='https://placehold.co/150x150/ff4757/ffffff?text=Ракета'">
    </div>

    <div id="game-container">
        <div id="title-bubble">Посмотри, что у мишки в космосе! Раскрась предметы!</div>
        <canvas id="coloringCanvas"></canvas>
    </div>

    <div id="palette-sidebar">
        <div class="sidebar-label">Палитра</div>
        
        <div class="swatch-container">
            <div class="color-swatch active" style="background-color: #ff4757;" data-color="#ff4757"></div>
            <div class="color-swatch" style="background-color: #2ed573;" data-color="#2ed573"></div>
            <div class="color-swatch" style="background-color: #1e90ff;" data-color="#1e90ff"></div>
            <div class="color-swatch" style="background-color: #ffa502;" data-color="#ffa502"></div>
            <div class="color-swatch" style="background-color: #9b59b6;" data-color="#9b59b6"></div>
            <div class="color-swatch" style="background-color: #00d2d3;" data-color="#00d2d3"></div>
            <div class="color-swatch" style="background-color: #ff6b81;" data-color="#ff6b81"></div>
            <div class="color-swatch" style="background-color: #eccc68;" data-color="#eccc68"></div>
            <div class="color-swatch" style="background-color: #f1f2f6;" data-color="#f1f2f6"></div>
            <div class="color-swatch" style="background-color: #57606f;" data-color="#57606f"></div>
            <div class="color-swatch" style="background-color: #d2873d;" data-color="#d2873d"></div>
        </div>
        
        <div class="btn-group">
            <button id="reset-btn">Сбросить</button>
            <button id="next-btn" onclick="location.href='M2.html'">Далее</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('coloringCanvas');
        const ctx = canvas.getContext('2d');
        const swatches = document.querySelectorAll('.color-swatch');
        const resetBtn = document.getElementById('reset-btn');
        const nextBtn = document.getElementById('next-btn');

        // Dynamic Rocket Targeting System (Simulating getting closer to the planet)
        window.addEventListener('load', () => {
            const rocket = document.querySelector('.rocket-ship');
            const saturn = document.querySelector('.planet-saturn');

            setTimeout(() => {
                const rocketRect = rocket.getBoundingClientRect();
                const saturnRect = saturn.getBoundingClientRect();

                const rocketCenterX = rocketRect.left + (rocketRect.width / 2);
                const rocketCenterY = rocketRect.top + (rocketRect.height / 2);
                
                const saturnCenterX = saturnRect.left + (saturnRect.width / 2);
                const saturnCenterY = saturnRect.top + (saturnRect.height / 2);

                const translateX = saturnCenterX - rocketCenterX;
                const translateY = saturnCenterY - rocketCenterY;

                rocket.style.transition = 'transform 4s cubic-bezier(0.45, 0, 0.55, 1), opacity 0.5s ease';
                rocket.style.opacity = '1';
                
                // Scale(1.2) enlarges the rocket as it gets closer to Saturn
                rocket.style.transform = `translate(${translateX}px, ${translateY}px) scale(0.2) rotate(45deg)`;
            }, 3500); 
        });

        let selectedColor = { r: 255, g: 71, b: 87 }; 
        const gameAsset = new Image();
        
        gameAsset.src = 'pictures/m_backpack_colorin.png'; 

        gameAsset.onload = () => {
            canvas.width = gameAsset.naturalWidth || 700;
            canvas.height = gameAsset.naturalHeight || 600;
            resetCanvas();
        };

        setTimeout(() => {
            const intro = document.getElementById('intro-stage');
            if(intro) intro.remove();
        }, 7500);

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(gameAsset, 0, 0, canvas.width, canvas.height);
            
            // Also reset rocket animation state when resetting canvas
            const rocket = document.querySelector('.rocket-ship');
            if (rocket) {
                rocket.style.transition = 'none';
                rocket.style.opacity = '0';
                rocket.style.transform = 'rotate(45deg)';
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        swatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelector('.color-swatch.active').classList.remove('active');
                swatch.classList.add('active');
                const hexValue = swatch.getAttribute('data-color');
                selectedColor = hexToRgb(hexValue);
            });
        });

        function floodFill(startX, startY, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;

            const startPos = (startY * width + startX) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            const startA = data[startPos + 3];

            if (startR === fillColor.r && startG === fillColor.g && startB === fillColor.b) return;
            if (startR < 65 && startG < 65 && startB < 65 && startA > 200) return; 

            const queue = [[startX, startY]];

            while (queue.length > 0) {
                const [x, y] = queue.shift();
                let currentY = y;

                while (currentY >= 0 && matchStartColor(currentY * width + x)) {
                    currentY--;
                }
                currentY++;

                let reachLeft = false;
                let reachRight = false;

                while (currentY < height && matchStartColor(currentY * width + x)) {
                    const pos = (currentY * width + x) * 4;
                    
                    data[pos] = fillColor.r;
                    data[pos + 1] = fillColor.g;
                    data[pos + 2] = fillColor.b;
                    data[pos + 3] = 255;

                    if (x > 0) {
                        if (matchStartColor(currentY * width + (x - 1))) {
                            if (!reachLeft) {
                                queue.push([x - 1, currentY]);
                                reachLeft = true;
                            }
                        } else if (reachLeft) {
                            reachLeft = false;
                        }
                    }

                    if (x < width - 1) {
                        if (matchStartColor(currentY * width + (x + 1))) {
                            if (!reachRight) {
                                queue.push([x + 1, currentY]);
                                reachRight = true;
                            }
                        } else if (reachRight) {
                            reachRight = false;
                        }
                    }

                    currentY++;
                }
            }

            ctx.putImageData(imageData, 0, 0);

            function matchStartColor(pixelIndex) {
                const p = pixelIndex * 4;
                return Math.abs(data[p] - startR) < 25 &&
                       Math.abs(data[p + 1] - startG) < 25 &&
                       Math.abs(data[p + 2] - startB) < 25 &&
                       data[p + 3] > 100;
            }
        }

        function handleColorTap(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = Math.floor((clientX - rect.left) * scaleX);
            const y = Math.floor((clientY - rect.top) * scaleY);

            floodFill(x, y, selectedColor);
            nextBtn.style.display = 'block';
        }

        canvas.addEventListener('click', (e) => {
            handleColorTap(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleColorTap(touch.clientX, touch.clientY);
        }, { passive: false });

        resetBtn.addEventListener('click', resetCanvas);
    </script>
</body>
</html>
