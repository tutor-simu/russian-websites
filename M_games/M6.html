<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Космическое Чтение | Проведи линию</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

        :root {
            --bg-dark: #0b0b1e;
            --card-bg: rgba(255, 255, 255, 0.95);
            --active-border: #ffa502;
            --success-border: #2ed573;
            --text-color: #1e272e;
        }

        html, body { 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b1b3a 0%, #080811 100%);
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            color: white;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: none;
        }

        /* Welcome Screen Overlay */
        #welcome-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 11, 30, 0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            padding: 20px;
            box-sizing: border-box;
        }

        .welcome-bubble {
            background: white;
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 90%;
            text-align: center;
            border: 4px solid #4a69bd;
            color: var(--text-color);
            box-sizing: border-box;
        }

        .welcome-bubble h1 { font-size: 36px; margin-top: 0; color: #4a69bd; font-weight: 900; }
        .welcome-bubble p { font-size: 20px; line-height: 1.5; margin-bottom: 25px; font-weight: 700; }

        #start-btn {
            padding: 15px 40px; font-size: 22px; font-weight: 800;
            background-color: #2ed573; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 6px 20px rgba(46, 213, 115, 0.4); 
            transition: transform 0.2s;
        }
        #start-btn:hover { transform: scale(1.05); }

        /* Game Board Layout */
        #game-layout {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 100vh;
            justify-content: center;
            align-items: center;
            z-index: 5;
            position: relative;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .screen-title {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 10px;
            color: #82ccdd;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
        }

        .instruction-text {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .matching-board {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 650px;
            position: relative;
            gap: clamp(30px, 8vw, 80px);
            box-sizing: border-box;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: clamp(20px, 4vh, 30px);
            width: 40%;
            max-width: 180px;
            z-index: 10;
        }
        #right-column {
            gap: 60px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid transparent;
            transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
            width: 100%;
        }

        .card.image-card {
            aspect-ratio: 1;
            padding: 0;
            background: #ffffff;
            cursor: pointer;
            touch-action: none;
            width: 100%;
            height: auto;
            max-width: 180px;
            max-height: 180px;
            min-width: 65px;
            min-height: 65px;
        }

        .card.text-card {
            font-size: clamp(24px, 4.5vw, 55px);
            font-weight: 900;
            color: var(--text-color);
            font-family: 'Nunito', sans-serif;
            letter-spacing: clamp(4px, 1vw, 12px);
            height: clamp(50px, 8vh, 90px);
            cursor: pointer;
            width: 100%;
            max-width: 180px;
            min-height: 50px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: block;
            transition: transform 0.3s;
        }

        .card.image-card:hover:not(.matched) img {
            transform: scale(1.15);
        }

        .card.image-card:hover:not(.matched) {
            border-color: var(--active-border);
            box-shadow: 0 0 25px rgba(255, 165, 2, 0.5);
        }

        .card.matched {
            border-color: var(--success-border);
            background-color: #e8f8f5;
        }

        /* SVG Connection lines canvas */
        #lines-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Dynamically Scaling Space Bear */
        #bear-anchor {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
            width: 8vw;
            min-width: 45px;
            max-width: 100px; 
        }

        .space-bear {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6));
            animation: floatingBear 3.5s ease-in-out infinite;
        }

        /* End-Game Victory Popup */
        .modal { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(11, 11, 30, 0.9); 
            backdrop-filter: blur(12px);
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 3000; 
        }

        .modal-content { 
            background: white;
            color: var(--text-color);
            padding: 30px; 
            border-radius: 30px; 
            text-align: center; 
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 4px solid #2ed573;
            box-sizing: border-box;
        }

        .modal-content h1 { color: #2ed573; font-size: 28px; font-weight: 900; margin-bottom: 20px; }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn { 
            flex: 1;
            padding: 14px 18px; 
            border-radius: 15px; 
            border: none; 
            font-size: 16px;
            font-weight: 800; 
            cursor: pointer; 
            text-decoration: none; 
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-restart { background: #ffa502; color: white; }
        .btn-next { background: #2ed573; color: white; }
        .btn:hover { transform: translateY(-3px); }

        @keyframes floatingBear {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <div id="finalModal" class="modal">
        <div class="modal-content">
            <h1>Миссия выполнена! </h1>
            <p style="font-size: 16px; font-weight: 700; margin-bottom: 20px;">Ты соединил все картинки!</p>
            <div class="btn-group">
                <button class="btn btn-restart" onclick="location.reload()">Заново</button>
                <button class="btn btn-next" onclick="location.href='M7.html'">Далее</button>
            </div>
        </div>
    </div>

    <div id="welcome-screen">
        <div class="welcome-bubble">
            <h1>Космическое чтение</h1>
            <p>Зажми и проведи линию от текста к правильной картинке!</p>
            <button id="start-btn" onclick="startGame()">Начать игру</button>
        </div>
    </div>

    <div id="game-layout">
        <div class="screen-title">Протяни линию от звука к картинке</div>
        <div class="instruction-text">Зажми на звуке и веди линию к картинке</div>
        
        <div class="matching-board" id="board-container">
            <svg id="lines-canvas"></svg>
            
            <div class="column" id="left-column"></div>
            <div class="column" id="right-column"></div>
        </div>
    </div>

    <div id="bear-anchor">
        <img class="space-bear" src="../pictures/game4/bear.png" alt="Space Bear" onerror="this.src='https://placehold.co/180x210/4a69bd/ffffff?text=🐻'">
    </div>

    <script>
        // Использованы русские кириллические буквы
        const pairs = [
            { id: 'cow', img: 'pictures/cow.png', text: 'МУ' },
            { id: 'crying', img: 'pictures/crying-kid.png', text: 'УА' },
            { id: 'lost', img: 'pictures/woman-on-tree.png', text: 'АУ' }
        ];

        let matchedCount = 0;
        let isDrawing = false;
        let startCard = null;
        let tempLine = null;
        const permanentLines = new Map();

        function startGame() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('game-layout').style.display = 'flex';
            initGame();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            const leftCol = document.getElementById('left-column');
            const rightCol = document.getElementById('right-column');
            leftCol.innerHTML = '';
            rightCol.innerHTML = '';

            const shuffledPairsText = shuffleArray([...pairs]);
            const shuffledPairsImages = shuffleArray([...pairs]);

            shuffledPairsText.forEach(pair => {
                const card = document.createElement('div');
                card.className = 'card text-card';
                card.dataset.id = pair.id;
                card.innerText = pair.text;
                
                card.addEventListener('mousedown', (e) => startDraw(e, card));
                card.addEventListener('touchstart', (e) => startDraw(e, card), { passive: false });
                
                leftCol.appendChild(card);
            });

            shuffledPairsImages.forEach(pair => {
                const card = document.createElement('div');
                card.className = 'card image-card';
                card.dataset.id = pair.id;
                
                const img = document.createElement('img');
                img.src = pair.img;
                img.alt = pair.id;
                img.onerror = () => { img.src = `https://placehold.co/150x150/7f8c8d/ffffff?text=${pair.id}`; };
                
                card.appendChild(img);
                rightCol.appendChild(card);
            });

            window.addEventListener('mousemove', drawLineMove);
            window.addEventListener('touchmove', drawLineMove, { passive: false });
            
            window.addEventListener('mouseup', endDraw);
            window.addEventListener('touchend', endDraw);
        }

        function getLeftCenter(element) {
            const boardRect = document.getElementById('board-container').getBoundingClientRect();
            const rect = element.getBoundingClientRect();
            return {
                x: rect.right - boardRect.left,
                y: rect.top + rect.height / 2 - boardRect.top
            };
        }

        function getRightCenter(element) {
            const boardRect = document.getElementById('board-container').getBoundingClientRect();
            const rect = element.getBoundingClientRect();
            return {
                x: rect.left - boardRect.left,
                y: rect.top + rect.height / 2 - boardRect.top
            };
        }

        function startDraw(e, card) {
            if (card.classList.contains('matched')) return;
            e.preventDefault();
            
            isDrawing = true;
            startCard = card;
            
            const svg = document.getElementById('lines-canvas');
            const startPoint = getLeftCenter(startCard);

            tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            tempLine.setAttribute('x1', startPoint.x);
            tempLine.setAttribute('y1', startPoint.y);
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const boardRect = document.getElementById('board-container').getBoundingClientRect();
            
            tempLine.setAttribute('x2', clientX - boardRect.left);
            tempLine.setAttribute('y2', clientY - boardRect.top);
            tempLine.setAttribute('stroke', '#ffa502');
            tempLine.setAttribute('stroke-width', '6');
            tempLine.setAttribute('stroke-dasharray', '8,8');
            tempLine.setAttribute('stroke-linecap', 'round');
            
            svg.appendChild(tempLine);
        }

        function drawLineMove(e) {
            if (!isDrawing || !tempLine) return;
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const boardRect = document.getElementById('board-container').getBoundingClientRect();
            
            tempLine.setAttribute('x2', clientX - boardRect.left);
            tempLine.setAttribute('y2', clientY - boardRect.top);
        }

        function endDraw(e) {
            if (!isDrawing) return;
            isDrawing = false;

            const svg = document.getElementById('lines-canvas');
            if (tempLine) {
                svg.removeChild(tempLine);
                tempLine = null;
            }

            const clientX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
            
            const elementBelow = document.elementFromPoint(clientX, clientY);
            const rightCard = elementBelow ? elementBelow.closest('.image-card') : null;

            if (rightCard && !rightCard.classList.contains('matched')) {
                if (rightCard.dataset.id === startCard.dataset.id) {
                    const id = startCard.dataset.id;
                    startCard.classList.add('matched');
                    rightCard.classList.add('matched');

                    const p1 = getLeftCenter(startCard);
                    const p2 = getRightCenter(rightCard);

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', p1.x);
                    line.setAttribute('y1', p1.y);
                    line.setAttribute('x2', p2.x);
                    line.setAttribute('y2', p2.y);
                    line.setAttribute('stroke', '#2ed573');
                    line.setAttribute('stroke-width', '8');
                    line.setAttribute('stroke-linecap', 'round');
                    
                    const length = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
                    line.style.strokeDasharray = length;
                    line.style.strokeDashoffset = length;
                    
                    svg.appendChild(line);
                    
                    line.getBoundingClientRect();
                    line.style.transition = 'stroke-dashoffset 0.5s ease-in-out';
                    line.style.strokeDashoffset = '0';

                    permanentLines.set(id, line);

                    matchedCount++;
                    if (matchedCount === pairs.length) {
                        setTimeout(() => {
                            document.getElementById('finalModal').style.display = 'flex';
                        }, 800);
                    }
                } else {
                    const p1 = getLeftCenter(startCard);
                    const p2 = getRightCenter(rightCard);

                    const wrongLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    wrongLine.setAttribute('x1', p1.x);
                    wrongLine.setAttribute('y1', p1.y);
                    wrongLine.setAttribute('x2', p2.x);
                    wrongLine.setAttribute('y2', p2.y);
                    wrongLine.setAttribute('stroke', '#ff4757');
                    wrongLine.setAttribute('stroke-width', '8');
                    wrongLine.setAttribute('stroke-linecap', 'round');
                    
                    svg.appendChild(wrongLine);

                    setTimeout(() => {
                        svg.removeChild(wrongLine);
                    }, 500);
                }
            }
            startCard = null;
        }

        window.addEventListener('resize', () => {
            if (matchedCount > 0) {
                const svg = document.getElementById('lines-canvas');
                svg.innerHTML = '';
                
                permanentLines.forEach((line, id) => {
                    const leftCard = document.querySelector(`.text-card[data-id="${id}"]`);
                    const rightCard = document.querySelector(`.image-card[data-id="${id}"]`);
                    
                    if (leftCard && rightCard) {
                        const p1 = getLeftCenter(leftCard);
                        const p2 = getRightCenter(rightCard);
                        
                        line.setAttribute('x1', p1.x);
                        line.setAttribute('y1', p1.y);
                        line.setAttribute('x2', p2.x);
                        line.setAttribute('y2', p2.y);
                        
                        svg.appendChild(line);
                    }
                });
            }
        });
    </script>
</body>
</html>
