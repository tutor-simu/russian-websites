<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Упражнение | Bilingvi Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --primary: #4a69bd;
            --accent: #78e08f;
            --bg: #f5f6fa;
            --text: #1e272e;
            --white: #ffffff;
            --shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Aesthetic Modal / Pop-up Overlay */
        .modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(30, 39, 46, 0.75); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            animation: fadeIn 0.4s ease;
        }
        
        /* Pop-up Card */
        .modal-content { 
            background: var(--white); 
            padding: 40px 30px; 
            border-radius: 35px; 
            text-align: center; 
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            transform: scale(0.9);
            animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.1s;
        }
        
        .modal-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .modal-content h1 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 2.2rem;
            font-weight: 800;
        }

        .modal-content p {
            font-size: 1.2rem;
            color: #576574;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* Main Content Card */
        .card { 
            background: var(--white); 
            padding: 40px; 
            border-radius: 35px; 
            box-shadow: var(--shadow); 
            width: 100%;
            max-width: 600px; 
            text-align: center; 
            box-sizing: border-box;
        }
        
        .card h1 {
            font-weight: 800;
            font-size: 2rem;
            color: var(--text);
            margin-bottom: 15px;
        }

        .card p {
            font-size: 1.2rem;
            color: #576574;
            font-weight: 600;
        }

        /* Buttons */
        .nav-controls { 
            display: flex; 
            gap: 20px; 
            margin-top: 35px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        
        .btn { 
            padding: 16px 38px; 
            border-radius: 50px; 
            border: none; 
            font-size: 1.1rem;
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: none; 
            display: inline-block; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .btn-again { background: #dfe6e9; color: var(--text); }
        .btn-next { background: var(--primary); color: var(--white); }
        
        .btn:hover { 
            transform: translateY(-5px) scale(1.03); 
            filter: brightness(1.1); 
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-10px); } 
        }
    </style>
</head>
<body>

    <div id="entranceModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon"></div>
            <h1>Привет!</h1>
            <p>Готовы начать упражнение?</p>
            <button class="btn btn-next" onclick="document.getElementById('entranceModal').style.display='none'">Начать</button>
        </div>
    </div>

    <div class="card">
        <h1>Упражнение</h1>
        <p>Ваш интерактивный контент будет здесь.</p>

        <div class="nav-controls">
            <a href="#" class="btn btn-again" onclick="location.reload()">Еще раз</a>
            <a href="#" class="btn btn-next">Следующее</a>
        </div>
    </div>

</body>
</html>
