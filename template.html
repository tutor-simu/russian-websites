<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Упражнение | Bilingvi Online</title>
    <style>
        :root {
            --primary: #2e86de;
            --accent: #4cd137;
            --bg: #f4f7f6;
            --text: #2f3640;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Modal Styles */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index:100; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 500px; }
        
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
        
        /* Side-by-side Buttons */
        .nav-controls { display: flex; gap: 20px; margin-top: 30px; justify-content: center; }
        .btn { padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-again { background: #eee; color: var(--text); }
        .btn-next { background: var(--primary); color: white; }
        .btn:hover { transform: translateY(-3px); }
    </style>
</head>
<body>

    <!-- Entrance Popup -->
    <div id="entranceModal" class="modal">
        <div class="modal-content">
            <h1>Привет!</h1>
            <p>Готовы начать упражнение?</p>
            <button class="btn btn-next" onclick="document.getElementById('entranceModal').style.display='none'">Начать</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="card">
        <h1>Упражнение</h1>
        <p>Ваш интерактивный контент будет здесь.</p>

        <!-- Side-by-side Navigation -->
        <div class="nav-controls">
            <a href="#" class="btn btn-again" onclick="location.reload()">Еще раз</a>
            <a href="#" class="btn btn-next">Следующее</a>
        </div>
    </div>

</body>
</html>
