<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приклей шишки на ветку | Bilingvi Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: #e0f2fe;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: #0f172a;
            margin-bottom: 5px;
            font-size: 28px;
            text-align: center;
        }

        p.instruction {
            color: #334155;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            background: #ffffff;
            padding: 12px 24px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
        }

        #game-board {
            width: 100%;
            max-width: 900px;
            position: relative;
            background: #f8fafc;
            border-radius: 30px;
            border: 6px solid #3b82f6;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            min-height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Branch/Tree Area at the top with realistic pine needles background */
        #branch-area {
            position: relative;
            min-height: 280px;
            background: 
                radial-gradient(circle at 20% 50%, rgba(16, 185, 129, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 60%, rgba(16, 185, 129, 0.2) 0%, transparent 50%),
                #f1f5f9;
            border-bottom: 4px solid #cbd5e1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 40px 20px 20px 20px; /* Adjusted padding to accommodate Y-axis shifting */
            box-sizing: border-box;
            gap: 20px;
        }

        /* Staggering the targets along the Y axis for a natural look */
        .target-cone:nth-child(2) {
            margin-top: -30px;
        }

        .target-cone:nth-child(3) {
            margin-top: 20px;
        }

        .target-cone:nth-child(4) {
            margin-top: -10px;
        }

        /* Decorative Pine Branch */
        .pine-branch-decor {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: 
                linear-gradient(135deg, transparent 60%, #047857 60%) 0 0 / 100px 100px,
                linear-gradient(225deg, transparent 60%, #065f46 60%) 100px 0 / 100px 100px;
            opacity: 0.15;
        }

        /* Targets for drops (White outline cones) */
        .target-cone {
            width: 150px;
            height: 190px;
            border: 4px dashed #0284c7;
            background: #ffffff;
            border-radius: 50% 50% 40% 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: 800;
            color: #0284c7;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Adding a sketched pine cone look to the targets */
        .target-cone::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 2px dashed #bae6fd;
            border-radius: 45% 45% 35% 35%;
        }

        .target-cone.filled {
            border-style: solid;
            border-color: #16a34a;
            background: #dcfce7;
            color: #15803d;
            transform: scale(1.05);
        }

        .target-cone.filled::before { display: none; }

        /* Source area at the bottom (Brown cones to cut out) */
        #source-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 30px 20px;
            min-height: 180px;
            background: #ffffff;
            border-radius: 0 0 25px 25px;
            box-sizing: border-box;
        }

        .draggable-cone {
            width: 140px;
            height: 180px;
            background: #c2410c; /* Realistic warm cone brown */
            border: 6px solid #7c2d12;
            border-radius: 50% 50% 40% 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 48px;
            font-weight: 800;
            cursor: grab;
            box-shadow: 0 10px 25px rgba(194, 65, 12, 0.3);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
            position: relative;
            z-index: 10;
        }

        /* Inner circle representing the white space on the worksheet cone */
        .draggable-cone::before {
            content: '';
            position: absolute;
            width: 96px;
            height: 96px;
            background: white;
            border-radius: 50%;
            border: 3px solid #7c2d12;
        }

        /* Syllable text placed above the background */
        .cone-text {
            position: relative;
            z-index: 2;
            color: #1e293b;
        }

        .draggable-cone:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .draggable-cone.placed {
            opacity: 0;
            pointer-events: none;
        }

        /* Success screen */
        #success-message {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(22, 163, 74, 0.95);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: 800;
            border-radius: 24px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        #success-message .button-group {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        #success-message button {
            padding: 15px 30px;
            background: white;
            color: #16a34a;
            border: none;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #success-message button.next-btn {
            background: #0284c7;
            color: white;
        }

        #success-message button:hover {
            transform: scale(1.05);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            #branch-area { min-height: auto; flex-direction: column; gap: 30px; padding: 20px; }
            .target-cone:nth-child(2), .target-cone:nth-child(3), .target-cone:nth-child(4) { margin-top: 0; }
            #source-area { flex-direction: column; gap: 25px; min-height: auto; }
            .target-cone, .draggable-cone { width: 110px; height: 140px; font-size: 36px; }
            .draggable-cone::before { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>

    <h1>Приклей шишки на ветку</h1>
    <p class="instruction">Перетащите цветные шишки с карточек вверху на пустые силуэты ветки и прочитайте слоги!</p>

    <div id="game-board">
        <div id="branch-area">
            <div class="pine-branch-decor"></div>
            <div class="target-cone" data-syllable="ШУ">ШУ</div>
            <div class="target-cone" data-syllable="ШО">ШО</div>
            <div class="target-cone" data-syllable="ША">ША</div>
        </div>

        <div id="source-area">
            <div class="draggable-cone" draggable="true" id="cone-ша" data-syllable="ША"><span class="cone-text">ША</span></div>
            <div class="draggable-cone" draggable="true" id="cone-шу" data-syllable="ШУ"><span class="cone-text">ШУ</span></div>
            <div class="draggable-cone" draggable="true" id="cone-шо" data-syllable="ШО"><span class="cone-text">ШО</span></div>
        </div>

        <div id="success-message">
            Отлично! Все шишки на ветке!
            <div class="button-group">
                <button onclick="location.reload()">Еще раз</button>
                <button class="next-btn" onclick="location.href='Ш4.html'">Далее</button>
            </div>
        </div>
    </div>

<script>
    const draggables = document.querySelectorAll('.draggable-cone');
    const targets = document.querySelectorAll('.target-cone');
    let placedCount = 0;

    draggables.forEach(draggable => {
        draggable.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', draggable.dataset.syllable);
            setTimeout(() => draggable.classList.add('placed'), 0);
        });

        draggable.addEventListener('dragend', (e) => {
            if (!draggable.classList.contains('dropped')) {
                draggable.classList.remove('placed');
            }
        });
    });

    targets.forEach(target => {
        target.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        target.addEventListener('drop', (e) => {
            e.preventDefault();
            const syllable = e.dataTransfer.getData('text/plain');
            
            if (target.dataset.syllable === syllable) {
                const draggedElement = document.querySelector(`.draggable-cone[data-syllable="${syllable}"]`);
                draggedElement.classList.add('dropped');
                
                target.innerText = syllable;
                target.classList.add('filled');

                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(syllable);
                    utterance.lang = 'ru-RU';
                    utterance.rate = 0.8;
                    window.speechSynthesis.speak(utterance);
                }

                placedCount++;
                checkWin();
            } else {
                const draggedElement = document.querySelector(`.draggable-cone[data-syllable="${syllable}"]`);
                if (draggedElement) draggedElement.classList.remove('placed');
            }
        });
    });

    function checkWin() {
        if (placedCount === 3) {
            document.getElementById('success-message').style.display = 'flex';
        }
    }
</script>
</body>
</html>
