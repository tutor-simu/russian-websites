<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Буквы С, А, О, У - Дополнительная практика</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #F8F9FA; 
            min-height: 100vh;
            padding: 40px 20px;
            color: #3A4750;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header { 
            text-align: center; 
            margin-bottom: 40px; 
        }

        .header h1 {
            font-size: 2.8rem;
            color: #4A90E2; 
            margin-bottom: 12px;
            font-weight: 800;
        }

        .header p {
            color: #748593;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
            margin-bottom: 50px;
        }

        .class-btn {
            padding: 24px 15px;
            text-align: center;
            border-radius: 20px;
            text-decoration: none;
            color: #3A4750;
            font-weight: 700;
            font-size: 1.3rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.05);
        }

        /* Pastel colors for the 2 buttons */
        .btn-1 { background-color: #E3F2FD; border: 2px solid #BAD7F2; } 
        .btn-2 { background-color: #E8F5E9; border: 2px solid #B8E0BB; } 

        .class-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.06);
        }

        .class-btn:active {
            transform: translateY(0);
        }

        .class-btn span {
            font-size: 0.85rem;
            display: block;
            margin-top: 6px;
            font-weight: 500;
            color: #748593;
        }

        .footer {
            text-align: center;
        }

        .back-btn {
            display: inline-block; 
            padding: 12px 35px; 
            background: #3A4750;
            color: white; 
            text-decoration: none; 
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #232B31;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Буквы С, А, О, У - Дополнительная практика</h1>
        </div>

        <div class="grid" id="lessons-grid"></div>

        <div class="footer">
            <a href="../index.html" class="back-btn">На главную</a>
        </div>
    </div>

    <script>
        const gridContainer = document.getElementById('lessons-grid');
        let htmlContent = '';
        
        // Loop restricted to 2 items to generate Class 1 and Class 2
        for (let i = 1; i <= 2; i++) {
            htmlContent += `
                <a href="../extra/07_ЗАКРЕПЛЕНИЕ/07ekstra${i}.html" class="class-btn btn-${i}">
                    Задание ${i}
                </a>`;
        }
        
        gridContainer.innerHTML = htmlContent;
    </script>

</body>
</html>
